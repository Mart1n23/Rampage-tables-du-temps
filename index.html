<meta charset="UTF-8">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    background: #0d0d0d;
    width: 100%; height: 100%;
  }

  body {
    background: transparent; color: #fff;
    font-family: 'Inter', sans-serif;
    width: 100vw; height: 100vh;
    overflow: hidden; position: relative;
    --accent: #c00018; --accent-bg: #2a0008; --accent-border: #c00018;
  }

  .bg-full {
    position: fixed;
    inset: 0;
    background:
      linear-gradient(to bottom,
        #0d0d0d 0%,
        transparent 15%,
        transparent 85%,
        #0d0d0d 100%
      ),
      radial-gradient(ellipse at 50% 50%, rgba(192, 0, 24, 0.4) 0%, #0d0d0d 70%);
    z-index: 0;
  }

  /* Scaler: fixed 1080x1920, scaled to fit */
  #scaler {
    position: absolute;
    width: 1080px;
    height: 1920px;
    transform-origin: top left;
    z-index: 1;
  }

  .content {
    position: relative; z-index: 1;
    padding: 55px 55px 35px;
    height: 100%; display: flex; flex-direction: column;
  }

  .top-bar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }

  .color-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--accent); border: 2px solid #ffffff15;
    cursor: pointer; flex-shrink: 0; margin-top: 8px; opacity: 0.6;
  }
  .color-menu {
    position: absolute; right: 0; top: 52px;
    background: #1a1a1a; border: 1px solid #333;
    border-radius: 8px; padding: 10px;
    display: none; flex-direction: column; gap: 8px; z-index: 100;
  }
  .color-menu.open { display: flex; }
  .color-option { width: 44px; height: 44px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
  .color-option:hover, .color-option.current { border-color: #fff; }

  .label { font-size: 22px; letter-spacing: 5px; color: var(--accent); text-transform: uppercase; margin-bottom: 6px; }
  .day-row { display: flex; align-items: flex-end; gap: 20px; }
  .day-item {
    font-family: 'Bebas Neue', sans-serif; line-height: 1;
    cursor: pointer; white-space: nowrap; user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: color 0.2s, font-size 0.2s;
    color: #ffffff22; font-size: 40px; padding-bottom: 6px;
  }
  .day-item.active { color: #fff; font-size: 90px; padding-bottom: 0; }
  .day-date { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: #ffffff44; letter-spacing: 6px; margin-top: 4px; margin-bottom: 12px; }

  /* Stage header row */
  .stage-row { display: grid; gap: 0 6px; margin-bottom: 6px; }
  .stage-header { border-top: 2px solid var(--accent); padding-top: 6px; }
  .sh-name { font-size: 18px; font-weight: 700; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }
  .sh-sub { font-size: 13px; color: #ffffff33; margin-top: 2px; }

  /* Timeline: axis col + stage cols side by side */
  .timeline { flex: 1; display: grid; gap: 0 6px; position: relative; min-height: 0; }

  /* Time axis */
  .time-axis { position: relative; }
  .tick-label {
    position: absolute; right: 8px;
    font-size: 18px; font-weight: 600;
    color: #ffffff55; letter-spacing: 1px;
    font-variant-numeric: tabular-nums;
    transform: translateY(-50%);
  }

  /* Each stage column is position:relative so acts can be absolute */
  .stage-col { position: relative; }

  /* Acts positioned absolutely within their column */
  .act {
    position: absolute; left: 0; right: 0;
    border-radius: 3px; padding: 8px 10px;
    background: #1c1c1c; border-left: 2px solid #333;
    overflow: hidden; cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent; user-select: none;
    box-sizing: border-box;
  }
  .act.selected { background: var(--accent-bg); border-left: 3px solid var(--accent-border); }
  .act-name { font-size: 22px; font-weight: 700; color: #fff; line-height: 1.2; }
  .act-time { font-size: 15px; color: #ffffff66; margin-top: 3px; }

  .footer { margin-top: 12px; display: flex; justify-content: space-between; align-items: center; }
  .footer-text { font-size: 12px; letter-spacing: 3px; color: #ffffff18; text-transform: uppercase; }
  .red-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); }
</style>
</head>

function fmtH(h) {
  const hh = h >= 24 ? h - 24 : h;
  const mm = (h % 1 === 0.5) ? '30' : '00';
  return String(Math.floor(hh)).padStart(2,'0') + ':' + mm;
}

function addLongPress(div, nameSelector) {
  let timer = null, didLong = false;
  const start = () => {
    didLong = false;
    timer = setTimeout(() => {
      didLong = true;
      const ne = div.querySelector(nameSelector);
      const cur = ne.textContent;
      const inp = document.createElement('input');
      inp.value = cur;
      inp.style.cssText = 'font-size:16px;font-weight:700;color:#fff;background:transparent;border:none;border-bottom:2px solid var(--accent);outline:none;width:100%;font-family:Inter,sans-serif;';
      ne.replaceWith(inp);
      inp.focus(); inp.select();
      const fin = () => {
        const nd = document.createElement('div');
        nd.className = ne.className;
        nd.textContent = inp.value.trim() || cur;
        inp.replaceWith(nd);
      };
      inp.addEventListener('blur', fin);
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') inp.blur(); });
    }, 1000);
  };
  const cancel = () => clearTimeout(timer);
  div.addEventListener('mousedown', start);
  div.addEventListener('touchstart', start, { passive: true });
  div.addEventListener('mouseup', cancel);
  div.addEventListener('touchend', cancel);
  div.addEventListener('mouseleave', cancel);
  div.addEventListener('click', () => { if (!didLong) div.classList.toggle('selected'); });
}

  axis.innerHTML = '';

  stageRow.style.gridTemplateColumns = day.gridCols;
  tl.style.gridTemplateColumns = day.gridCols;

  // Stage headers
  stageRow.appendChild(document.createElement('div'));
  day.stages.forEach(s => {
    const d = document.createElement('div');
    d.className = 'stage-header';
    d.innerHTML = `<div class="sh-name">${s.name}</div>${s.sub ? `<div class="sh-sub">${s.sub}</div>` : ''}`;
    stageRow.appendChild(d);
  });

  requestAnimationFrame(() => {
    const totalH = tl.clientHeight;
    const totalMin = (day.endHour - day.startHour) * 60;
    const pxPerMin = totalH / totalMin;
    const GAP = 2; // small visual gap in pixels between adjacent acts

    // Tick labels on axis
    for (let h = day.startHour; h <= day.endHour; h++) {
      const minOffset = (h - day.startHour) * 60;
      const topPx = minOffset * pxPerMin;
      const span = document.createElement('span');
      span.className = 'tick-label';
      span.textContent = fmtH(h);
      span.style.top = topPx + 'px';
      axis.appendChild(span);
    }

    // Stage columns — acts positioned absolutely by time
    day.stages.forEach(s => {
      const col = document.createElement('div');
      col.className = 'stage-col';

      s.acts.forEach(a => {
        const topMin = (a.start - day.startHour) * 60;
        const durMin = (a.end - a.start) * 60;
        const topPx = topMin * pxPerMin;
        const heightPx = durMin * pxPerMin - GAP;

        const div = document.createElement('div');
        div.className = 'act';
        div.style.top = topPx + 'px';
        div.style.height = heightPx + 'px';
        div.innerHTML = `<div class="act-name">${a.name}</div><div class="act-time">${fmtH(a.start)} – ${fmtH(a.end)}</div>`;
        addLongPress(div, '.act-name');
        col.appendChild(div);
      });

      tl.appendChild(col);
    });
  });
}

window.addEventListener('load', () => {
  renderDay('jeudi');

  let lang = 'fr';

  document.querySelectorAll('.day-item').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('.day-item').forEach(d => d.classList.remove('active'));
      el.classList.add('active');
      const dateKey = lang === 'fr' ? 'dateFr' : 'dateEn';
      document.getElementById('current-date').textContent = el.dataset[dateKey];
      renderDay(el.dataset.day);
    });
  });

  // Language toggle
  const langBtn = document.getElementById('lang-btn');
  langBtn.addEventListener('click', e => {
    e.stopPropagation();
    lang = lang === 'fr' ? 'en' : 'fr';
    langBtn.textContent = lang.toUpperCase();
    document.querySelectorAll('.day-item').forEach(el => {
      el.textContent = el.dataset[lang];
    });
    const active = document.querySelector('.day-item.active');
    if (active) {
      const dateKey = lang === 'fr' ? 'dateFr' : 'dateEn';
      document.getElementById('current-date').textContent = active.dataset[dateKey];
    }
  });

  const colorBtn = document.getElementById('color-btn');
  const colorMenu = document.getElementById('color-menu');
  colorBtn.addEventListener('click', e => { e.stopPropagation(); colorMenu.classList.toggle('open'); });
  document.addEventListener('click', () => colorMenu.classList.remove('open'));
  document.querySelectorAll('.color-option').forEach(opt => {
    opt.addEventListener('click', e => {
      e.stopPropagation();
      document.body.style.setProperty('--accent', opt.dataset.accent);
      document.body.style.setProperty('--accent-bg', opt.dataset.bg);
      document.body.style.setProperty('--accent-border', opt.dataset.border);
      document.querySelector('.bg-full').style.background = `linear-gradient(to bottom, #0d0d0d 0%, transparent 15%, transparent 85%, #0d0d0d 100%), radial-gradient(ellipse at 50% 50%, ${opt.dataset.glow} 0%, #0d0d0d 70%)`;      colorBtn.style.background = opt.dataset.accent;
      document.querySelectorAll('.color-option').forEach(o => o.classList.remove('current'));
      opt.classList.add('current');
      colorMenu.classList.remove('open');
    });
  });

  // Scale scaler to fit screen, bg-full covers everything
  function applyScale() {
    const scaler = document.getElementById('scaler');
    const scale = Math.min(window.innerWidth / 1080, window.innerHeight / 1920);
    scaler.style.transform = `scale(${scale})`;
    scaler.style.left = ((window.innerWidth - 1080 * scale) / 2) + 'px';
    scaler.style.top = ((window.innerHeight - 1920 * scale) / 2) + 'px';
  }
  applyScale();
  window.addEventListener('resize', applyScale);

  // Fullscreen
  const fsBtn = document.getElementById('fs-btn');
  const rightPanel = document.getElementById('right-panel');

  fsBtn.addEventListener('click', e => {
    e.stopPropagation();
    const el = document.documentElement;
    (el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen).call(el);
  });

  document.addEventListener('fullscreenchange', () => {
    const isFS = !!document.fullscreenElement;
    rightPanel.style.visibility = isFS ? 'hidden' : 'visible';
    applyScale();
    if (isFS) {
      document.addEventListener('click', exitOnClick);
    } else {
      document.removeEventListener('click', exitOnClick);
    }
  });

  function exitOnClick(e) {
    if (!e.target.closest('.act') && !e.target.closest('.day-item')) {
      (document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen).call(document);
    }
  }

});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0d0d">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&family=Comic+Neue:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    background: #0d0d0d;
    width: 100%; height: 100%;
    overflow: hidden;
  }

  :root { --accent: #eb0028; --accent-bg: #4b000e; --accent-border: #eb0028; }

  body {
    background: transparent; color: #fff;
    font-family: 'Inter', sans-serif;
    width: 100vw; height: 100dvh;
    overflow: hidden; position: relative;
    opacity: 0; transition: opacity 0.2s;
  }

  .bg-full {
    position: fixed;
    inset: 0;
    background:
      linear-gradient(to bottom,
        #0d0d0d 0%,
        transparent 15%,
        transparent 85%,
        #0d0d0d 100%
      ),
      radial-gradient(ellipse at 50% 50%, rgba(235, 0, 40, 0.4) 0%, #0d0d0d 70%);
    z-index: 0;
  }

  #scaler {
    position: absolute;
    width: 1080px;
    height: 1920px;
    transform-origin: top left;
    z-index: 1;
  }

  .content {
    position: relative; z-index: 1;
    padding: 32px 55px 70px;
    height: 100%; display: flex; flex-direction: column;
  }

  .top-bar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }

  .color-btn {
    width: 65px; height: 65px; border-radius: 50%;
    background: var(--accent); border: 2px solid #ffffff15;
    cursor: pointer; flex-shrink: 0; opacity: 0.6;
  }
  .color-menu {
    position: absolute; right: 0;
    display: none; flex-direction: column; gap: 8px; z-index: 100;
  }
  .color-menu.open { display: flex; }
  .color-option { width: 65px; height: 65px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
  .color-option:hover, .color-option.current { border-color: #fff; }

  .label { font-size: 22px; letter-spacing: 5px; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 28px; }
  #days-left { font-family: 'Bebas Neue', sans-serif; font-size: 34px; letter-spacing: 3px; color: var(--accent); opacity: 0.85; flex-shrink: 0; position: relative; top: 2px; }
  .is-fullscreen #days-left { display: none; }
  .is-fullscreen .day-item:not(.active) { display: none; }
  .disco-mode .day-item[data-day="jeudi"] { display: none; }
  .day-row { display: flex; align-items: flex-end; gap: 20px; }
  .day-item {
    font-family: 'Bebas Neue', sans-serif; line-height: 1;
    cursor: pointer; white-space: nowrap; user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: color 0.2s, font-size 0.2s;
    color: #ffffff22; font-size: 40px; padding-bottom: 6px;
  }
  .day-item.active { color: #fff; font-size: 90px; padding-bottom: 0; }
  .lang-zh .day-item { font-size: 38px; }
  .lang-zh .day-item.active { font-size: 82px; }
  .day-date { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: #ffffff44; letter-spacing: 6px; margin-top: 8px; margin-bottom: 12px; }

  .stage-row { display: grid; gap: 0 6px; margin-bottom: 6px; }
  .stage-header { border-top: 2px solid var(--accent); padding-top: 6px; }
  .sh-name { font-size: 21px; font-weight: 700; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }
  .sh-sub { font-size: 13px; color: #ffffff66; margin-top: 2px; }

  .timeline { flex: 1; display: grid; gap: 0 6px; position: relative; min-height: 0; }

  .time-axis { position: relative; }
  .tick-label {
    position: absolute; right: 8px;
    font-size: 18px; font-weight: 600;
    color: #ffffffaa; letter-spacing: 1px;
    font-variant-numeric: tabular-nums;
    transform: translateY(-50%);
  }

  .stage-col { position: relative; }

  .act {
    position: absolute; left: 0; right: 0;
    border-radius: 3px; padding: 10px 13px;
    background: #1c1c1c; border-left: 3px solid #444; border-top: 1px solid #2a2a2a;
    overflow: hidden; cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent; user-select: none;
    box-sizing: border-box;
    display: flex; flex-direction: column;
  }
  .act.selected { background: var(--accent-bg); border-left: 3px solid var(--accent-border); }
  .act.selected::before { content: ''; position: absolute; inset: 0; background: var(--accent); opacity: 0.15; border-radius: inherit; pointer-events: none; }
  .act.act-now { background: #2a2a2a; border-left: 4px solid var(--accent); border-top-color: var(--accent); }
  .act.act-past { opacity: 0.75; }
  .act-disco-r { border-left-color: #e63939; }
  .act-disco-b { border-left-color: #3399ff; }
  .act-disco-g { border-left-color: #00c853; }
  .disco-mode .act { background: #272727; opacity: 1; }
  .disco-mode .act.act-past { opacity: 0.75; }
  .disco-mode .act.act-now { background: #2f2f2f; border-left-width: 4px; border-top-color: transparent; }
  .disco-mode .act.selected { background: #606060; }
  .disco-mode .act.selected::before { display: none; }
  .disco-mode.is-fullscreen .act.selected { background: #737373; }
  .disco-mode .sh-name { font-size: 56px; }
  .disco-mode .sh-sub { font-size: 37px; font-weight: 600; opacity: 1; }
  .disco-mode .act-name { font-size: 40px; }
  .disco-mode .act-time { font-size: 36px; }
  .easter-active .act { opacity: 0.85; }
  .easter-active .act.act-past { opacity: 0.555; }
  .is-fullscreen .act-past { opacity: 1; }
  .is-fullscreen .act { opacity: 1; }
  .is-fullscreen .act-now { background: #1c1c1c; border-left: 3px solid #444; border-top-color: #2a2a2a; }
  .is-fullscreen .act.selected { background: var(--accent-bg); border-left: 3px solid var(--accent-border); }
  .is-fullscreen #now-line { display: none; }
  .act-name { flex: 1; min-height: 0; display: -webkit-box; -webkit-box-orient: vertical; overflow: hidden; font-size: 20px; font-weight: 700; color: #fff; line-height: 1.3; }
  .act-time { font-size: 18px; color: #ffffff88; margin-top: 3px; flex-shrink: 0; }
  #act-name-toast {
    position: absolute; top: 90px; left: 60px; right: 60px;
    border-radius: 16px; padding: 20px 28px; font-size: 30px; font-weight: 700; color: #fff;
    text-align: center; z-index: 500; pointer-events: none;
    opacity: 0; transition: opacity 0.25s;
  }
  #act-name-toast.visible { opacity: 1; }

  .act-runescape.selected::before { background: #ffffff; opacity: 0.1; }
  .runescape-active .act-runescape.selected::before,
  .runescape-unlocked .act-runescape.selected::before { background: var(--accent); opacity: 0.15; }

  .comic-sans, .comic-sans * { font-family: 'Comic Neue', 'Comic Sans MS', 'Comic Sans', cursive !important; }
  .comic-sans .day-item { font-family: 'Bebas Neue', sans-serif !important; }

  .camping-card { border-radius: 3px; padding: 22px 20px; background: #1c1c1c; border-left: 3px solid #444; border-top: 1px solid #2a2a2a; }
  .camping-card-active { background: #2a2a2a; border-left: 4px solid var(--accent); }
  .camping-label { font-size: 26px; font-weight: 700; color: #fff; }
  .camping-time { font-size: 22px; color: #ffffff88; margin-top: 6px; }

  .is-fullscreen #disco-img { opacity: 0 !important; }

  img[id$="-img"] { opacity: 0; transition: opacity 0.6s; }
</style>

<script>
let accentColor = '#eb0028', accentBg = '#4b000e', accentBorder = '#eb0028';

const SHEET_ID_PROD = '1Vovax0HOLgo6ktqchvsajUFLejK-K_oq1tNC1s8E1VE'; // Rampage 2026 - Timetable
const SHEET_ID_TEST = '1z1sxHzhJWjWlyTdjYGRn1UBuFW8GnauAjQbJeL-3V38'; // Rampage 2026 - TEST
const SHEET_ID = location.hostname.endsWith('github.io') ? SHEET_ID_PROD : SHEET_ID_TEST;
let overrides = {};
let discoMode = false;
let campingMode = false;
let discoHours = { start: 25, end: 29 };
let infoData = {};
let discoStyles = {};
let currentLang = 'fr';

function parseCSVRow(row) {
  const result = [];
  let cur = '';
  let inQ = false;
  for (let i = 0; i < row.length; i++) {
    const ch = row[i];
    if (ch === '"') { inQ = !inQ; }
    else if ((ch === ',' || ch === '\t') && !inQ) { result.push(cur.trim()); cur = ''; }
    else { cur += ch; }
  }
  result.push(cur.trim());
  return result;
}

function parseOverridesFromCsv(text) {
  const parsed = {};
  infoData = {};
  discoStyles = {};
  const rows = (text || '').trim().split(/\r?\n/).map(parseCSVRow);
  if (!rows.length) return parsed;

  const dayNames = ['jeudi', 'vendredi', 'samedi', 'dimanche'];
  const normalizeDay = value => (value || '').trim().toLowerCase();

  rows.forEach(row => {
    const values = row.map(v => (v || '').trim());
    if (!values.some(v => v)) return;

    let index = 0;
    while (index < values.length) {
      const rawValue = values[index] || '';
      const day = normalizeDay(rawValue);

      if (dayNames.includes(day)) {
        const stage = values[index + 1] || '';
        const start = values[index + 2] || '';
        const end = values[index + 3] || '';
        const name = values[index + 4] || '';

        if (day && stage && start) {
          const stageNorm = stage.toLowerCase();
          if (stageNorm === 'camping') {
            let s = parseTimeStr(start), e = parseTimeStr(end);
            if (!isNaN(s)) {
              if (s < 6) s += 24;
              if (!isNaN(e) && e < 6) e += 24;
              if (!infoData[day]) infoData[day] = [];
              infoData[day].push({ label: name || '', start: s, end: isNaN(e) ? null : e });
            }
          } else if ((stageNorm === 'discor' || stageNorm === 'discob' || stageNorm === 'discog') && start.toLowerCase() === 'genre') {
            const canonical = stageNorm === 'discor' ? 'DiscoR' : stageNorm === 'discob' ? 'DiscoB' : 'DiscoG';
            if (!discoStyles[day]) discoStyles[day] = {};
            discoStyles[day][canonical] = values.slice(index + 3).find(v => v !== '') || '';
          } else {
            const startNum = parseTimeStr(start);
            const endNum = parseTimeStr(end) || null;
            if (!isNaN(startNum)) {
              const key = `${day}|${stage}|${startNum}`;
              parsed[key] = { name: name || '', end: isNaN(endNum) ? null : endNum };
            }
          }
        }

        index += 5;
        while (index < values.length && !(values[index] || '').trim()) {
          index += 1;
        }
        continue;
      }

      index += 1;
    }
  });

  return parsed;
}

async function loadOverrides() {
  if (!SHEET_ID || SHEET_ID === 'YOUR_SHEET_ID_HERE') return overrides;

  try {
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), 5000);
    const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`, { signal: ctrl.signal });
    clearTimeout(tid);
    const text = await res.text();
    overrides = parseOverridesFromCsv(text);
  } catch (e) {
    console.warn('Impossible de charger les overrides depuis le Google Sheet', e);
  }

  return overrides;
}

const EASTER_EVENTS = {

const DAYS = {

    startHour: 18, endHour: 25,

function getNow() {
  const p = new URLSearchParams(location.search).get('t');
  if (!p) return new Date();
  const normalized = p.split(':').length === 2 ? p + ':00' : p;
  const d = new Date(normalized);
  return isNaN(d) ? new Date() : d;
}

function parseTimeStr(str) {
  const s = (str || '').trim().replace(',', '.');
  if (s.includes(':')) {
    const [hPart, mPart] = s.split(':');
    const h = parseInt(hPart, 10), m = parseInt(mPart, 10);
    if (!isNaN(h) && !isNaN(m)) return h + m / 60;
  }
  return parseFloat(s);
}

function fmtH(h) {
  const hh = h >= 24 ? h - 24 : h;
  const totalMin = Math.round((h % 1) * 60);
  return String(Math.floor(hh)).padStart(2,'0') + ':' + String(totalMin).padStart(2,'0');
}

function applyActNameClamp(nameEl, heightPx) {
  const lines = Math.max(1, Math.floor((heightPx - 20 - 18) / 26));
  nameEl.style.webkitLineClamp = lines;
}

function showActNameToast(name) {
  const scaler = document.getElementById('scaler');
  let toast = document.getElementById('act-name-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'act-name-toast';
    scaler.appendChild(toast);
  }
  toast.textContent = name;
  toast.style.background = accentBg;
  toast.style.border = `2px solid ${accentColor}`;
  toast.style.boxShadow = `0 0 28px ${accentColor}, 0 4px 32px rgba(0,0,0,0.6)`;
  toast.classList.add('visible');
  clearTimeout(window._actNameToastTimer);
  window._actNameToastTimer = setTimeout(() => toast.classList.remove('visible'), 2500);
}

function addActBehavior(div) {
  div.addEventListener('click', () => {
    const nameEl = div.querySelector('.act-name');
    if (nameEl && nameEl.scrollHeight > nameEl.clientHeight) {
      showActNameToast(nameEl.textContent);
    }
    div.classList.toggle('selected');
    const sel = div.classList.contains('selected');
    const isRuneRave = div.querySelector('.act-name')?.textContent.trim() === 'RuneScape Rave'
                    && !document.body.classList.contains('runescape-active') && !document.body.classList.contains('runescape-unlocked');
    const isDiscoAct = div.classList.contains('act-disco-r') || div.classList.contains('act-disco-b') || div.classList.contains('act-disco-g');
    div.style.background = sel ? (isRuneRave ? '#555' : isDiscoAct ? '' : accentBg) : '';
    if (sel) {
      div.style.borderLeftColor = isRuneRave ? '#fff' : accentBorder;
    } else {
      const isNow = div.classList.contains('act-now');
      const isFS = document.body.classList.contains('is-fullscreen');
      const discoColor = div.classList.contains('act-disco-r') ? '#e63939' : div.classList.contains('act-disco-b') ? '#3399ff' : div.classList.contains('act-disco-g') ? '#00c853' : null;
      div.style.borderLeftColor = discoColor || ((isNow && !isFS) ? accentColor : '');
      div.style.borderTopColor = (!discoColor && isNow && !isFS) ? accentColor : '';
    }
    try {
      const stored = JSON.parse(localStorage.getItem('favs'));
      let favs = Array.isArray(stored) ? stored : [];
      if (sel) favs.push(div.id);
      else favs = favs.filter(f => f !== div.id);
      localStorage.setItem('favs', JSON.stringify(favs));
    } catch(e) {}
    updateResetBtn();
  });
}

function renderDay(dayKey) {
  const day = DAYS[dayKey];
  const stageRow = document.getElementById('stage-row');
  const tl = document.getElementById('tl');
  const axis = document.getElementById('axis');

  stageRow.innerHTML = '';
  tl.querySelectorAll('.stage-col').forEach(e => e.remove());
  axis.innerHTML = '';

  stageRow.style.gridTemplateColumns = day.gridCols;
  tl.style.gridTemplateColumns = day.gridCols;

  stageRow.appendChild(document.createElement('div'));
  day.stages.forEach(s => {
    const d = document.createElement('div');
    d.className = 'stage-header';
    d.style.borderTopColor = accentColor;
    d.innerHTML = `<div class="sh-name">${s.name}</div>${s.sub ? `<div class="sh-sub">${s.sub}</div>` : ''}`;
    d.querySelector('.sh-name').style.color = accentColor;
    stageRow.appendChild(d);
  });

  requestAnimationFrame(() => {
    const totalH = tl.clientHeight;
    const totalMin = (day.endHour - day.startHour) * 60;
    const pxPerMin = totalH / totalMin;
    const GAP = 2;

    for (let h = day.startHour; h <= day.endHour; h++) {
      const minOffset = (h - day.startHour) * 60;
      const topPx = minOffset * pxPerMin;
      const span = document.createElement('span');
      span.className = 'tick-label';
      span.textContent = fmtH(h);
      span.style.top = topPx + 'px';
      axis.appendChild(span);
    }

    let favs = [];
    try { const s = JSON.parse(localStorage.getItem('favs')); if (Array.isArray(s)) favs = s; } catch(e) {}

    day.stages.forEach(s => {
      const col = document.createElement('div');
      col.className = 'stage-col';

      // Build a local acts array and inject any overrides that refer to times not present in the default schedule
      const acts = s.acts.slice();
      Object.keys(overrides).forEach(k => {
        const parts = k.split('|');
        if (parts.length !== 3) return;
        const [d, stageName, startStr] = parts;
        if (d !== dayKey || stageName !== s.name) return;
        const startNum = parseFloat(startStr);
        if (Number.isNaN(startNum)) return;
        const exists = acts.some(act => Math.abs((act.start || 0) - startNum) < 0.0001);
        if (!exists) {
          const ov = overrides[k];
          const endNum = ov && typeof ov.end === 'number' ? ov.end : (startNum + 1);
          acts.push({ name: (ov && ov.name) || '', start: startNum, end: endNum });
        }
      });

      acts.sort((a,b) => a.start - b.start);

      acts.forEach(a => {
        const key = `${dayKey}|${s.name}|${a.start}`;
        const ov = overrides[key];
        const displayName = ov ? (ov.name || a.name) : a.name;
        const displayEnd = ov && typeof ov.end === 'number' ? ov.end : a.end;

        const topMin = (a.start - day.startHour) * 60;
        const durMin = (displayEnd - a.start) * 60;
        const topPx = topMin * pxPerMin;
        const heightPx = durMin * pxPerMin - GAP;

        const div = document.createElement('div');
        div.id = `${dayKey}-${s.name}-${a.start}`;
        div.className = 'act' + (a.name === 'RuneScape Rave' ? ' act-runescape' : '');
        if (favs.includes(div.id)) {
          div.classList.add('selected');
          const isRR = a.name === 'RuneScape Rave' && !document.body.classList.contains('runescape-active') && !document.body.classList.contains('runescape-unlocked');
          div.style.background = isRR ? '#555' : accentBg;
          div.style.borderLeftColor = isRR ? '#fff' : accentBorder;
        }
        div.dataset.start = a.start;
        div.dataset.end = displayEnd;
        div.style.top = topPx + 'px';
        div.style.height = heightPx + 'px';
        div.innerHTML = `<div class="act-name">${displayName === '?' ? '' : displayName}</div><div class="act-time">${fmtH(a.start)} – ${fmtH(displayEnd)}</div>`;
        applyActNameClamp(div.querySelector('.act-name'), heightPx);
        addActBehavior(div);
        col.appendChild(div);
      });

      tl.appendChild(col);
    });

    updateNowLine();

    updateResetBtn();
  });
}

function getDiscoActs(dayKey) {
  const result = { DiscoR: [], DiscoB: [], DiscoG: [] };
  Object.keys(overrides).forEach(key => {
    const [d, stage, startStr] = key.split('|');
    if (d !== dayKey) return;
    const norm = stage.toLowerCase();
    if (norm !== 'discor' && norm !== 'discob' && norm !== 'discog') return;
    const bucket = norm === 'discor' ? 'DiscoR' : norm === 'discob' ? 'DiscoB' : 'DiscoG';
    const ov = overrides[key];
    const rawStart = parseFloat(startStr);
    const start = rawStart < 6 ? rawStart + 24 : rawStart;
    const rawEnd = typeof ov.end === 'number' ? ov.end : rawStart + 1;
    const end = rawEnd < 6 ? rawEnd + 24 : rawEnd;
    result[bucket].push({ name: ov.name || '', start, end });
  });
  result.DiscoR.sort((a, b) => a.start - b.start);
  result.DiscoB.sort((a, b) => a.start - b.start);
  result.DiscoG.sort((a, b) => a.start - b.start);
  return result;
}

function renderDisco(dayKey) {
  const acts = getDiscoActs(dayKey);

  const stageRow = document.getElementById('stage-row');
  const tl       = document.getElementById('tl');
  const axis     = document.getElementById('axis');

  stageRow.innerHTML = '';
  tl.querySelectorAll('.stage-col, #now-line').forEach(e => e.remove());
  axis.innerHTML = '';

  const dayStyles = discoStyles[dayKey] || {};
  const ALL_STAGES = [
    { key: 'DiscoR', cssClass: 'act-disco-r', label: currentLang === 'zh' ? '红' : currentLang === 'en' ? 'RED'   : 'ROUGE', color: '#e63939', style: dayStyles['DiscoR'] || '' },
    { key: 'DiscoB', cssClass: 'act-disco-b', label: currentLang === 'zh' ? '蓝' : currentLang === 'en' ? 'BLUE'  : 'BLEU',  color: '#3399ff', style: dayStyles['DiscoB'] || '' },
    { key: 'DiscoG', cssClass: 'act-disco-g', label: currentLang === 'zh' ? '绿' : currentLang === 'en' ? 'GREEN' : 'VERT',  color: '#00c853', style: dayStyles['DiscoG'] || '' },
  ];

  const DISCO_STAGES = ALL_STAGES.filter(s => acts[s.key].some(a => a.name !== ''));
  const allActs = DISCO_STAGES.flatMap(s => acts[s.key]);

  const colCount = DISCO_STAGES.length;
  const gridCols = `60px ${'1fr '.repeat(Math.max(colCount, 1)).trim()}`;
  stageRow.style.gridTemplateColumns = gridCols;
  tl.style.gridTemplateColumns       = gridCols;

  stageRow.appendChild(document.createElement('div'));
  DISCO_STAGES.forEach(s => {
    const d = document.createElement('div');
    d.className = 'stage-header';
    d.style.borderTopColor = s.color;
    d.innerHTML = `<div class="sh-name" style="color:${s.color}">${s.label}</div>${s.style ? `<div class="sh-sub" style="color:${s.color}">${s.style}</div>` : ''}`;
    stageRow.appendChild(d);
  });

  if (!allActs.length) return;

  const startHour = Math.floor(Math.min(...allActs.map(a => a.start)));
  const endHour   = Math.ceil( Math.max(...allActs.map(a => a.end)));
  discoHours = { start: startHour, end: endHour };

  requestAnimationFrame(() => {
    const totalH   = tl.clientHeight;
    const totalMin = (endHour - startHour) * 60;
    const pxPerMin = totalH / totalMin;
    const GAP = 2;

    for (let h = startHour; h <= endHour; h++) {
      const span = document.createElement('span');
      span.className = 'tick-label';
      span.textContent = fmtH(h);
      span.style.top = ((h - startHour) * 60 * pxPerMin) + 'px';
      axis.appendChild(span);
    }

    let favs = [];
    try { const s = JSON.parse(localStorage.getItem('favs')); if (Array.isArray(s)) favs = s; } catch(e) {}

    DISCO_STAGES.forEach(s => {
      const col = document.createElement('div');
      col.className = 'stage-col';
      acts[s.key].forEach(a => {
        if (!a.name) return;
        const topPx    = (a.start - startHour) * 60 * pxPerMin;
        const heightPx = (a.end   - a.start)   * 60 * pxPerMin - GAP;
        const div = document.createElement('div');
        div.id = `${dayKey}-${s.key}-${a.start}`;
        div.className = `act ${s.cssClass}`;
        div.dataset.start = a.start;
        div.dataset.end   = a.end;
        div.style.top     = topPx + 'px';
        div.style.height  = heightPx + 'px';
        div.style.borderLeftColor = s.color;
        if (favs.includes(div.id)) {
          div.classList.add('selected');
        }
        div.innerHTML = `<div class="act-name">${a.name === '?' ? '' : a.name}</div><div class="act-time">${fmtH(a.start)} – ${fmtH(a.end)}</div>`;
        applyActNameClamp(div.querySelector('.act-name'), heightPx);
        addActBehavior(div);
        col.appendChild(div);
      });
      tl.appendChild(col);
    });

    updateNowLine();
    updateResetBtn();
  });
}

function updateResetBtn() {
  const btn = document.getElementById('reset-btn');
  if (!btn) return;
  try {
    const favs = JSON.parse(localStorage.getItem('favs'));
    btn.style.display = Array.isArray(favs) && favs.length > 0 ? 'flex' : 'none';
  } catch(e) { btn.style.display = 'none'; }
}


function getCurrentFestivalDay() {
  const now = getNow();
  const d = new Date(now);
  if (now.getHours() < 2) d.setDate(d.getDate() - 1);
  if (d.getFullYear() !== 2026 || d.getMonth() !== 6) return null;
  return { 2: 'jeudi', 3: 'vendredi', 4: 'samedi', 5: 'dimanche' }[d.getDate()] || null;
}

function getDiscoDay() {
  const now = getNow();
  const d = new Date(now);
  if (now.getHours() < 6) d.setDate(d.getDate() - 1);
  if (d.getFullYear() !== 2026 || d.getMonth() !== 6) return 'vendredi';
  const day = { 3: 'vendredi', 4: 'samedi', 5: 'dimanche' }[d.getDate()];
  return day || 'vendredi';
}

function updateDiscoBtn() {
  const btn = document.getElementById('disco-btn');
  if (!btn) return;
  if (discoMode) { btn.style.display = 'flex'; return; }
  const now = getNow();
  const h = now.getHours() + now.getMinutes() / 60;
  const d = now.getDate(), m = now.getMonth(), y = now.getFullYear();
  const visible = y === 2026 && m === 6 && (
    ((d === 4 || d === 5) && h < 6) ||
    (d === 6 && h < 4.5)
  );
  btn.style.display = visible ? 'flex' : 'none';
}

  // Info button is always visible
}

function renderCamping(dayKey) {
  const stageRow = document.getElementById('stage-row');
  const tl       = document.getElementById('tl');
  const axis      = document.getElementById('axis');

  stageRow.innerHTML = '';
  tl.querySelectorAll('.stage-col, #now-line').forEach(e => e.remove());
  axis.innerHTML = '';

  const gridCols = '60px 1fr';
  stageRow.style.gridTemplateColumns = gridCols;
  tl.style.gridTemplateColumns = gridCols;

  stageRow.appendChild(document.createElement('div')); // axis placeholder
  const header = document.createElement('div');
  header.className = 'stage-header';
  header.style.borderTopColor = accentColor;
  header.innerHTML = `<div class="sh-name" style="color:${accentColor}">INFOS</div>`;
  stageRow.appendChild(header);

  const col = document.createElement('div');
  col.className = 'stage-col';
  col.style.cssText = 'display:flex;flex-direction:column;gap:14px;padding:16px 0;';

  const now = getNow();
  let h = now.getHours() + now.getMinutes() / 60;
  if (h < 6) h += 24;
  const todayKey = getCurrentFestivalDay();

  (infoData[dayKey] || []).forEach(item => {
    const isActive = todayKey === dayKey && h >= item.start && (item.end === null || h < item.end);
    const card = document.createElement('div');
    card.className = 'camping-card' + (isActive ? ' camping-card-active' : '');
    if (isActive) card.style.borderLeftColor = accentColor;
    const timeStr = item.end !== null ? `${fmtH(item.start)} - ${fmtH(item.end)}` : fmtH(item.start);
    card.innerHTML = `<div class="camping-label">${item.label}</div><div class="camping-time">${timeStr}</div>`;
    col.appendChild(card);
  });

  tl.appendChild(col);
  updateResetBtn();
}

function updateNowLine() {
  const tl = document.getElementById('tl');
  const existing = document.getElementById('now-line');

  if (discoMode) {
    const renderedDay = document.querySelector('.day-item.active')?.dataset.day;
    if (renderedDay && renderedDay !== getDiscoDay()) {
      if (existing) existing.remove();
      document.querySelectorAll('.act').forEach(act => {
        act.classList.remove('act-now', 'act-past');
      });
      return;
    }
    const now = getNow();
    let h = now.getHours() + now.getMinutes() / 60;
    if (h < 6) h += 24;
    if (h < discoHours.start || h >= discoHours.end) {
      if (existing) existing.remove();
      document.querySelectorAll('.act').forEach(act => {
        act.classList.remove('act-now');
        act.classList.remove('act-past');
      });
      return;
    }
    const totalH   = tl.clientHeight;
    const totalMin = (discoHours.end - discoHours.start) * 60;
    const topPx    = ((h - discoHours.start) * 60) / totalMin * totalH;
    const line = existing || document.createElement('div');
    line.id = 'now-line';
    if (!existing) {
      Object.assign(line.style, { position: 'absolute', left: '0', right: '0', height: '2px', background: 'var(--accent)', boxShadow: '0 0 8px var(--accent)', zIndex: '10', pointerEvents: 'none' });
      tl.appendChild(line);
    }
    line.style.top = topPx + 'px';
    document.querySelectorAll('.act').forEach(act => {
      const s = parseFloat(act.dataset.start), e = parseFloat(act.dataset.end);
      act.classList.toggle('act-now',  h >= s && h < e);
      act.classList.toggle('act-past', h >= e);
    });
    return;
  }

  const festivalDay = getCurrentFestivalDay();
  const activeDay = document.querySelector('.day-item.active');

  const dayOrder = ['jeudi', 'vendredi', 'samedi', 'dimanche'];
  const festivalIdx = festivalDay ? dayOrder.indexOf(festivalDay) : -1;
  const viewedIdx = activeDay ? dayOrder.indexOf(activeDay.dataset.day) : -1;

  if (festivalDay && viewedIdx < festivalIdx) {
    if (existing) existing.remove();
    document.querySelectorAll('.act').forEach(act => {
      act.classList.add('act-past');
      act.classList.remove('act-now');
    });
    return;
  }

  if (!festivalDay || !activeDay || activeDay.dataset.day !== festivalDay) {
    if (existing) existing.remove();
    return;
  }

  const day = DAYS[festivalDay];
  const now = getNow();
  let h = now.getHours() + now.getMinutes() / 60;
  if (h < 2) h += 24;

  if (h < day.startHour || h >= day.endHour) {
    if (existing) existing.remove();
    return;
  }

  const totalH = tl.clientHeight;
  const totalMin = (day.endHour - day.startHour) * 60;
  const topPx = ((h - day.startHour) * 60) / totalMin * totalH;

  const line = existing || document.createElement('div');
  line.id = 'now-line';
  if (!existing) {
    Object.assign(line.style, {
      position: 'absolute', left: '0', right: '0',
      height: '2px', background: 'var(--accent)',
      boxShadow: '0 0 8px var(--accent)',
      zIndex: '10', pointerEvents: 'none'
    });
    tl.appendChild(line);
  }
  line.style.top = topPx + 'px';

  const isFS = document.body.classList.contains('is-fullscreen');
  document.querySelectorAll('.act').forEach(act => {
    const s = parseFloat(act.dataset.start);
    const e = parseFloat(act.dataset.end);
    const isNow = h >= s && h < e;
    act.classList.toggle('act-now', isNow);
    act.classList.toggle('act-past', h >= e);
    act.style.borderLeftColor = (isNow && !isFS) ? accentColor : '';
    act.style.borderTopColor = (isNow && !isFS) ? accentColor : '';
  });
}

  function setEaster(mode) {
    const wasActive = easterActive;
    easterActive = easterActive === mode ? null : mode;
    Object.entries(EASTER_EVENTS).forEach(([k, cfg]) => {
      document.getElementById(k + '-img').style.opacity = easterActive === k ? cfg.opacity : '0';
    });
    document.body.classList.toggle('easter-active', easterActive !== null);
    document.body.classList.toggle('runescape-active', easterActive === 'runescape');
    if (easterActive === 'runescape') document.body.classList.add('runescape-unlocked');
    if (easterActive) {
      const cfg = EASTER_EVENTS[easterActive];
      preEasterState = { accent: accentColor, bg: accentBg, border: accentBorder, bgFull: document.querySelector('.bg-full').style.background };
      accentColor = cfg.accent; accentBg = cfg.bg; accentBorder = cfg.border;
      document.querySelector('.bg-full').style.background = cfg.blackBg ? '#0d0d0d' : `linear-gradient(to bottom, #0d0d0d 0%, transparent 15%, transparent 85%, #0d0d0d 100%), radial-gradient(ellipse at 50% 50%, ${cfg.glow} 0%, #0d0d0d 70%)`;
      applyAccentToElements();
    } else if (wasActive && preEasterState) {
      accentColor = preEasterState.accent; accentBg = preEasterState.bg; accentBorder = preEasterState.border;
      document.querySelector('.bg-full').style.background = preEasterState.bgFull;
      applyAccentToElements();
      preEasterState = null;
    }
  }

  const manuallyTriggered = new Set();
  function triggerEaster(key) {
    const wasActive = easterActive === key;
    if (wasActive) manuallyTriggered.delete(key);
    else manuallyTriggered.add(key);
    setEaster(key);
    const cfg = EASTER_EVENTS[key];
    if (cfg.comic) document.getElementById('scaler').classList.toggle('comic-sans', !wasActive);
  }

  let shrekClicks = 0, shrekTimer;
  let comicClicks = 0, comicTimer;
  let runeClicks = 0, runeTimer;
  const easterLabel = document.querySelector('.label');
  const easterDate = document.getElementById('current-date');

  document.addEventListener('pointerdown', (e) => {
    if (e.target.closest('.label')) {
      if (shrekClicks === 0) shrekTimer = setTimeout(() => shrekClicks = 0, 5000);
      shrekClicks++;
      easterLabel.style.color = '#fff';
      setTimeout(() => easterLabel.style.color = accentColor, 200);
      if (shrekClicks >= 5) { shrekClicks = 0; clearTimeout(shrekTimer); triggerEaster('shrek'); }
    }
    if (e.target.closest('#current-date')) {
      if (comicClicks === 0) comicTimer = setTimeout(() => comicClicks = 0, 5000);
      comicClicks++;
      easterDate.style.color = '#fff';
      setTimeout(() => easterDate.style.color = '', 200);
      if (comicClicks >= 5) { comicClicks = 0; clearTimeout(comicTimer); triggerEaster('alien'); }
    }
  });

  document.addEventListener('click', e => {
    const act = e.target.closest('.act');
    if (!act || act.querySelector('.act-name')?.textContent.trim() !== 'RuneScape Rave') return;
    if (runeClicks === 0) runeTimer = setTimeout(() => runeClicks = 0, 5000);
    runeClicks++;
    if (runeClicks >= 6) {
      runeClicks = 0; clearTimeout(runeTimer);
      localStorage.setItem('rs_unlocked', '1');
      document.body.classList.add('runescape-unlocked');
      triggerEaster('runescape');
    }
  });

  (() => {
    const now = getNow();
    const h = now.getHours(), m = now.getMinutes();
    const nowMins = h * 60 + m;
    const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    let exactKey = null, windowKey = null;
    Object.entries(EASTER_EVENTS).forEach(([key, cfg]) => {
      if (cfg.activeDates && !cfg.activeDates.includes(todayStr)) return;
      const inWindow = cfg.triggers.some(t => nowMins >= t.h * 60 + t.m && nowMins < t.endH * 60 + (t.endM ?? 0));
      if (!inWindow) return;
      const isExact = cfg.triggers.some(t => t.h === h && t.m === m);
      if (isExact) exactKey = key;
      else windowKey = key;
    });
    const toActivate = exactKey ?? windowKey;
    if (toActivate) {
      setEaster(toActivate);
      if (EASTER_EVENTS[toActivate].comic) document.getElementById('scaler').classList.add('comic-sans');
    }
  })();

  setInterval(() => {
    const now = getNow();
    const h = now.getHours(), m = now.getMinutes();
    const nowMins = h * 60 + m;
    const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    Object.entries(EASTER_EVENTS).forEach(([key, cfg]) => {
      if (manuallyTriggered.has(key)) return;
      if (cfg.activeDates && !cfg.activeDates.includes(todayStr)) return;
      const isTrigger = cfg.triggers.some(t => t.h === h && t.m === m);
      const isEnd     = cfg.triggers.some(t => h === t.endH && m === (t.endM ?? 0));
      const inWindow  = cfg.triggers.some(t => nowMins >= t.h * 60 + t.m && nowMins < t.endH * 60 + (t.endM ?? 0));
      if (!inWindow && !isEnd) {
        sessionStorage.removeItem(`rs_${key}`);
        sessionStorage.removeItem(`re_${key}`);
        return;
      }
      if (isTrigger && !sessionStorage.getItem(`rs_${key}`)) {
        sessionStorage.setItem(`rs_${key}`, '1');
        location.reload();
      } else if (isEnd && !sessionStorage.getItem(`re_${key}`)) {
        sessionStorage.setItem(`re_${key}`, '1');
        location.reload();
      }
    });
  }, 1000);

  function exitOnClick(e) {
    if (!e.target.closest('.act') && !e.target.closest('.day-item')) {
      leaveFS();
    }
  }

});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<script>try{document.documentElement.dataset.lang=localStorage.getItem('lang')||'fr';}catch(e){}try{document.documentElement.dataset.bootTheme=localStorage.getItem('sunMode')==='1'?'sun':'dark';}catch(e){}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&family=Comic+Neue:wght@400;700&family=Share+Tech+Mono&display=swap">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    background: #000000;
    width: 100%; height: 100%;
    overflow: hidden;
  }

  :root {
    --accent: #eb0028;
    --accent-bg: #4b000e;
    --accent-border: #eb0028;
    --header-gap: 6px;
    --day-date-gap: 13px;
    --day-date-pull: -10px;
    --summary-bg: rgba(255,255,255,0.94);
    --summary-text: #050505;
    --muted-time: #f0f0f0;
    --future-act-bg: #5e5e5ebd;
    --future-act-border: #8c8c8c;
    --future-act-top: #585858;
    --future-act-left-width: 3px;
    --future-act-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
    --past-act-bg: #1a1a1a;
    --past-act-border: #353535;
    --past-act-top: #272727;
    --past-act-text: #959595;
    --past-act-time: #888888;
    --past-act-opacity: 0.55;
    --past-act-filter: saturate(0.60) brightness(0.65);
    --past-act-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
    --selected-act-bg: var(--accent-bg);
    --selected-act-text: #fff;
    --selected-act-time: var(--muted-time);
    --selected-act-left-width: 6px;
    --selected-act-top: #8a8a8a;
    --selected-act-shadow: inset 0 0 0 1px rgba(255,255,255,0.12);
    --selected-act-overlay-opacity: 0.38;
    --current-act-bg: var(--accent-bg);
    --current-act-text: #fff;
    --current-act-time: var(--muted-time);
    --current-act-left-width: 7px;
    --current-act-top: var(--accent);
    --current-act-shadow: 0 0 26px rgba(255,255,255,0.36), 0 0 18px var(--accent), inset 0 0 28px rgba(255,255,255,0.14);
    --current-act-filter: brightness(1.32);
    --disco-act-bg: #272727;
    --disco-selected-bg: #606060;
    --disco-now-bg: #484848;
    --disco-now-shadow: 0 0 28px rgba(255,255,255,0.42), inset 0 0 30px rgba(255,255,255,0.16);
    --control-bg: rgba(255,255,255,0.30);
    --control-border: rgba(255,255,255,0.54);
    --control-unavailable-bg: rgba(255,255,255,0.10);
    --control-unavailable-border: rgba(255,255,255,0.24);
    --control-active-border: #fff;
    --font-scale: 1;
    --stage-name-size: 21px;
    --fs-stage-name-boost: 1.8; 
    --stage-sub-size: 18px;
    --stage-sub-height: 40px;
    --edge-gap: 24px;
    --bottom-btn-size: 149px;
    --popover-btn-size: 119.2px;
    --color-option-size: 95px;
  }

  body.disco-mode {
    --font-scale: 1.666667;
  }


  body {
    background: transparent; color: #fff;
    font-family: 'Inter', sans-serif;
    width: 100vw; height: 100dvh;
    overflow: hidden; position: relative;
    opacity: 0; transition: opacity 0s;
  }

  html:not(.page-revealed)::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 9999;
    pointer-events: none;
    background:
      linear-gradient(rgba(255,255,255,.20) 0 0) 62px 70px / 380px 24px no-repeat,
      linear-gradient(rgba(255,255,255,.13) 0 0) 62px 120px / 780px 64px no-repeat,
      repeating-linear-gradient(
        to bottom,
        transparent 0 78px,
        rgba(255,255,255,.09) 78px 80px
      ) 62px 300px / 956px 1280px no-repeat,
      repeating-linear-gradient(
        to right,
        transparent 0 185px,
        rgba(255,255,255,.07) 185px 187px
      ) 62px 300px / 956px 1280px no-repeat,
      #000;
  }
  html[data-boot-theme="sun"]:not(.page-revealed)::before {
    background:
      linear-gradient(rgba(0,0,0,.18) 0 0) 62px 70px / 380px 24px no-repeat,
      linear-gradient(rgba(0,0,0,.10) 0 0) 62px 120px / 780px 64px no-repeat,
      repeating-linear-gradient(
        to bottom,
        transparent 0 78px,
        rgba(0,0,0,.16) 78px 80px
      ) 62px 300px / 956px 1280px no-repeat,
      repeating-linear-gradient(
        to right,
        transparent 0 185px,
        rgba(0,0,0,.10) 185px 187px
      ) 62px 300px / 956px 1280px no-repeat,
      #fff;
  }
  @media (prefers-reduced-motion: no-preference) {
    html:not(.page-revealed)::before {
      animation: skeleton-pulse 1.6s ease-in-out infinite;
    }
    @keyframes skeleton-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.72; }
    }
  }
  html.page-revealed::before {
    display: none;
  }

  :root { --grid-line-color: rgba(255,255,255,0.18); }
  body.light-mode:not(.disco-mode) { --grid-line-color: rgba(0,0,0,0.20); }
  .bg-full {
    position: fixed;
    inset: 0;
    background: #000000;
    z-index: 0;
  }
  .bg-full::after { content: ''; position: absolute; inset: 0; background: transparent; pointer-events: none; }
  .is-fullscreen .bg-full { filter: brightness(0.67); }
  .is-fullscreen .bg-full::after { background: rgba(0,0,0,0.33); }
  body.light-mode.is-fullscreen .bg-full { filter: none; }
  body.light-mode.is-fullscreen .bg-full::after { background: transparent; }

  #scaler {
    position: absolute;
    width: 1080px;
    height: 1920px;
    transform-origin: top left;
    z-index: 1;
  }

  .easter-img {
    position: absolute; top: 0; left: 0;
    width: 1080px; height: 1920px;
    object-fit: cover; pointer-events: none; z-index: 0;
  }
  .easter-img.contain { object-fit: contain; object-position: top center; }
  #fr-img {
    top: auto;
    bottom: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center bottom;
  }
  #disco-img { width: 540px; height: 960px; left: 270px; }

  .round-btn {
    border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    user-select: none; -webkit-user-select: none;
  }
  .top-btn { width: var(--popover-btn-size); height: var(--popover-btn-size); }
  .bottom-btn { width: var(--bottom-btn-size); height: var(--bottom-btn-size); }
  .top-btn, .bottom-btn {
    position: relative;
    border: 3px solid var(--control-border);
    background: var(--control-bg);
    opacity: 1;
    transition: background 0.15s, border-color 0.15s, border-width 0.15s, opacity 0.15s, filter 0.15s, box-shadow 0.15s;
  }
  .top-btn.control-unavailable, .bottom-btn.control-unavailable {
    background: var(--control-unavailable-bg);
    border-color: var(--control-unavailable-border);
    opacity: 0.58;
    filter: saturate(0.65) brightness(0.78);
  }
  .top-btn.control-active, .bottom-btn.control-active {
    border-color: var(--control-active-border);
    border-width: 7px;
    opacity: 1;
    filter: none;
  }
  #settings-popover {
    position: absolute; right: calc((var(--bottom-btn-size) - var(--popover-btn-size)) / 2); bottom: 182px;
    display: none; flex-direction: column; align-items: center; gap: 17px;
    z-index: 40; pointer-events: none;
  }
  #bottom-bar.settings-open #settings-popover { display: flex; }
  #settings-popover > *, #settings-popover .top-btn, #settings-popover .color-option { pointer-events: auto; }
  #settings-popover .top-btn { box-shadow: 0 10px 28px rgba(0,0,0,0.75), inset 0 0 0 1px rgba(255,255,255,0.22); backdrop-filter: blur(8px); }
  #reset-wrap { display: none; position: relative; }
  #reset-label {
    display: none; position: absolute; top: 50%; right: calc(100% + 14px); transform: translateY(-50%);
    font: 64px 'Bebas Neue', sans-serif; color: #ff4444; letter-spacing: 3px; white-space: nowrap;
  }
  #reset-btn { border-color: var(--control-border); }
  #lang-btn {
    font: 89px/1 'Bebas Neue', sans-serif; letter-spacing: 1px; color: #fff;
    -webkit-touch-callout: none;
    padding-top: 5px; text-align: center;
  }
  #camping-btn { font: 109px 'Bebas Neue', sans-serif; color: #fff; }
  #settings-btn svg { width: 98px; height: 98px; }
  .info-col { display: flex; flex-direction: column; gap: 14px; padding: 16px 0; }

  .content {
    position: relative; z-index: 1;
    padding: 25px 62px 100px;
    height: 100%; display: flex; flex-direction: column;
  }

  /* Fullscreen only: capture/wallpaper framing. Defaults keep desktop fullscreen unchanged. */
  .is-fullscreen .content {
    padding:
      var(--fs-pad-top, 25px)
      var(--fs-pad-right, 62px)
      var(--fs-pad-bottom, 100px)
      var(--fs-pad-left, 62px);
  }
  .is-fullscreen .easter-img { height: 100%; }
  body.is-fullscreen.fs-safe-guides::after {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 9998;
    pointer-events: none;
    background:
      linear-gradient(to bottom, rgba(255,0,0,.16) 0 12%, transparent 12% 88%, rgba(255,0,0,.12) 88% 100%),
      linear-gradient(to right, rgba(255,0,0,.10) 0 7%, transparent 7% 93%, rgba(255,0,0,.10) 93% 100%);
  }

  #bottom-bar {
    position: absolute;
    left: var(--edge-gap); right: var(--edge-gap); bottom: var(--edge-gap);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0;
    flex-shrink: 0; z-index: 30;
    pointer-events: none;
    opacity: 1;
  }
  #left-btns, #right-btns { display: flex; align-items: center; gap: 33px; }
  #right-btns { position: relative; }
  #bottom-bar .bottom-btn {
    pointer-events: auto;
    box-shadow: 0 10px 28px rgba(0,0,0,0.75), inset 0 0 0 1px rgba(255,255,255,0.22);
    backdrop-filter: blur(8px);
  }
  .is-fullscreen #bottom-bar { display: none !important; }
  .is-fullscreen #now-line { display: none !important; }


  .top-bar { position: relative; display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  #status-box {
    position: absolute;
    top: 6px;
    left: 680px;
    width: 380px;
    min-height: 96px;
    pointer-events: none;
    z-index: 28;
  }
  #now-summary {
    display: none;
    width: 100%;
    max-width: 100%;
    padding: 12px 14px 13px;
    background: transparent;
    color: #fff;
    box-shadow: none;
    overflow: hidden;
  }
  #now-summary.has-content { display: flex; flex-direction: column; gap: 8px; }
  #now-summary .summary-section { display: contents; }
  #now-summary .summary-list { display: contents; }
  #now-summary .summary-kicker,
  #now-summary .summary-row {
    display: block;
    font-size: 22px;
    font-weight: 900;
    line-height: 23px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .lang-zh #now-summary .summary-kicker,
  .lang-zh #now-summary .summary-row { font-size: 18px; line-height: 23px; }
  #now-summary .summary-kicker { color: var(--accent); }
  #now-summary .summary-row { color: #fff; }
  #now-summary .summary-stage { color: var(--accent); }

  #color-slot { position: relative; }
  .color-btn {
    width: var(--popover-btn-size); height: var(--popover-btn-size); border-radius: 50%;
    background: var(--accent); border: 2px solid #ffffff30;
    cursor: pointer; flex-shrink: 0; opacity: 0.8;
    filter: saturate(0.88) brightness(0.72);
  }
  .color-menu {
    position: absolute; right: calc(100% + 12px); top: 50%; transform: translateY(-50%);
    display: none; flex-direction: row; gap: 8px; z-index: 100;
  }
  .color-menu.open { display: flex; }
  .color-option { width: var(--color-option-size); height: var(--color-option-size); border-radius: 50%; cursor: pointer; border: 3px solid transparent; filter: saturate(0.72) brightness(0.70); touch-action: manipulation; opacity: 0.8; }
  .color-option:hover, .color-option.current { border-color: #fff; filter: saturate(1.0) brightness(0.92); opacity: 1; }


  .label { font-size: 24px; letter-spacing: 5px; color: var(--accent); text-transform: uppercase; margin-bottom: var(--header-gap, 6px); cursor: pointer; display: flex; align-items: center; gap: 28px; }
  #days-left { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 3px; color: var(--accent); opacity: 0.85; flex-shrink: 0; position: relative; top: 2px; }
  body.disco-mode #days-left,
  body.camping-mode #days-left,
  body.favs-only #days-left,
  body.is-fullscreen #days-left { display: none; }
  .disco-mode .day-item[data-day="jeudi"] { display: none; }
  .day-row { display: flex; align-items: flex-end; gap: 20px; height: 94px; flex-shrink: 0; }
  .day-item {
    font-family: 'Bebas Neue', sans-serif; line-height: 1;
    cursor: pointer; white-space: nowrap; user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: color 0.2s, font-size 0.2s;
    color: #ffffff55; font-size: 40px; padding-bottom: 6px;
  }
  .day-item.active { color: #fff; font-size: 90px; padding-bottom: 0; }
  .lang-zh .day-item { font-size: 38px; }
  .lang-zh .day-item.active { font-size: 82px; }
  .day-date { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--accent); letter-spacing: 6px; margin-top: calc(var(--day-date-gap, 3px) + var(--day-date-pull, -10px)); margin-bottom: 12px; }
  .is-fullscreen .day-item:not(.active) { display: none; }
  .is-fullscreen .label { font-size: 35px; margin-bottom: 16px; }
  .is-fullscreen .day-row { height: 145px; }
  .is-fullscreen .day-item.active { font-size: 135px; -webkit-text-stroke: 2px #fff; }
  .lang-zh.is-fullscreen .day-item.active { font-size: 123px; }
  .is-fullscreen .day-date { font-size: 54px; margin-top: 16px; -webkit-text-stroke: 1px var(--accent); }
  .is-fullscreen #status-box { display: none !important; }


  .stage-row { display: grid; gap: 0 9px; margin-bottom: 6px; flex-shrink: 0; min-height: 74px; overflow: visible; }
  .disco-mode .stage-row { position: relative; z-index: 20; }
  .disco-mode .timeline { position: relative; z-index: 1; }
  .disco-mode .stage-header { position: relative; z-index: 25; }
  .stage-header { position: relative; border-top: 2px solid var(--accent); padding-top: 6px; padding-bottom: 8px; }
  .stage-header.sh-bar-glow::before {
    content: ''; position: absolute; left: 0; right: 0; top: -7px; height: 9px;
    background: var(--accent);
    box-shadow: 0 -12px 18px 0 var(--accent);
    clip-path: inset(-50px 0 0 0);
  }
  .sh-name { font-size: calc(var(--stage-name-size) * var(--font-scale, 1)); font-weight: 900; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; text-shadow: 0 0 15px rgba(255, 255, 255, 0.082), 0 1px 0 #000; }
  .is-fullscreen .sh-name { font-size: calc(var(--stage-name-size) * var(--font-scale, 1) * var(--fs-stage-name-boost, 1)); }
  .sh-sub { font-size: calc(var(--stage-sub-size) * var(--font-scale, 1)); line-height: 1.12; height: calc(var(--stage-sub-height) * var(--font-scale, 1)); color: #ffffff55; margin-top: 2px; overflow: hidden; }

  .timeline { flex: 1; display: grid; gap: 0 9px; position: relative; min-height: 0; isolation: isolate; }

  .time-axis { position: relative; }
  .tick-label {
    position: absolute; right: 8px;
    font-family: 'Share Tech Mono', 'Inter', monospace;
    font-size: 29px; font-weight: 400;
    color: var(--muted-time, #ffffff88); letter-spacing: 1px;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    transform: translateY(-50%);
  }

  .stage-col { position: relative; }
  .grid-line { position: absolute; left: 62px; right: 0; height: 2px; background: var(--grid-line-color); pointer-events: none; z-index: -1; }

  .act {
    position: absolute; left: 0; right: 0;
    display: block !important;
    overflow: hidden !important;
    padding: 7px 7px 6px 8px;
    background: var(--future-act-bg);
    border-left: var(--future-act-left-width) solid var(--future-act-border);
    border-top: 1px solid var(--future-act-top);
    box-shadow: var(--future-act-shadow);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, box-shadow 0.15s, filter 0.15s, opacity 0.15s;
    -webkit-tap-highlight-color: transparent; user-select: none;
    box-sizing: border-box;
  }
  .act.selected {
    background: var(--selected-act-bg);
    border-left: var(--selected-act-left-width) solid var(--accent-border);
    border-top-color: var(--selected-act-top);
    box-shadow: var(--selected-act-shadow);
  }
  .act.selected::before { content: ''; position: absolute; inset: 0; background: var(--accent); opacity: var(--selected-act-overlay-opacity); border-radius: inherit; pointer-events: none; z-index: 0; }
  body:not(.is-fullscreen) .act.act-now.selected::before { opacity: 0.68; }
  body:not(.disco-mode) .act.selected:not(.act-now) > .act-body > .act-name { color: var(--selected-act-text) !important; -webkit-text-stroke: 1px currentColor; }
  body:not(.disco-mode) .act.selected:not(.act-now) > .act-body > .act-time { color: var(--selected-act-time) !important; }
  body:not(.disco-mode) .act.selected.act-now {
    background: var(--current-act-bg);
    border-left-color: var(--accent-border);
    border-top-color: var(--current-act-top);
  }
  body:not(.disco-mode) .act.selected.act-now > .act-body > .act-name { color: #fff !important; }
  .act.act-now {
    box-shadow: var(--current-act-shadow);
  }
  .act.act-now > .act-body { filter: var(--current-act-filter); }
  .act.act-now > .act-body > .act-name { color: var(--current-act-text) !important; }
  body:not(.is-fullscreen) .act.act-now > .act-body > .act-name { opacity: 1 !important; }
  .act.act-now > .act-body > .act-time { color: var(--current-act-time) !important; }
  .act.act-past { background: var(--past-act-bg); border-left-color: var(--past-act-border); border-top-color: var(--past-act-top); opacity: var(--past-act-opacity); filter: var(--past-act-filter); box-shadow: var(--past-act-shadow); }
  .act-disco-r { border-left-color: #e63939; }
  .act-disco-b { border-left-color: #3399ff; }
  .act-disco-g { border-left-color: #00c853; }
  .disco-mode .act { background: var(--disco-act-bg); opacity: 1; }
  .disco-mode .act.act-past { background: var(--past-act-bg); border-left-color: var(--past-act-border); border-top-color: var(--past-act-top); opacity: var(--past-act-opacity); filter: var(--past-act-filter); box-shadow: var(--past-act-shadow); }
  .disco-mode .act.act-now {
    background: var(--disco-now-bg);
    border-left-width: var(--current-act-left-width);
    border-top-color: var(--current-act-top);
    box-shadow: var(--disco-now-shadow);
  }
  .disco-mode .act.act-now > .act-body { filter: var(--current-act-filter); }
  .disco-mode .act.selected { background: var(--disco-selected-bg); box-shadow: var(--selected-act-shadow); }
  .disco-mode .act.selected > .act-body > .act-name { color: var(--selected-act-text) !important; }
  .disco-mode .act.selected > .act-body > .act-time { color: var(--selected-act-time) !important; }
  .disco-mode .act.selected::before { display: none; }
  .disco-mode .act.act-disco-r.selected { background: #3d0808 !important; }
  .disco-mode .act.act-disco-b.selected { background: #05103d !important; }
  .disco-mode .act.act-disco-g.selected { background: #013d0e !important; }
  .disco-mode .act.act-disco-r.selected::before { display: block; background: #e63939; opacity: 0.30; }
  .disco-mode .act.act-disco-b.selected::before { display: block; background: #3399ff; opacity: 0.30; }
  .disco-mode .act.act-disco-g.selected::before { display: block; background: #00c853; opacity: 0.30; }
  .disco-mode .act.act-disco-r.selected,
  .disco-mode .act.act-disco-b.selected,
  .disco-mode .act.act-disco-g.selected { border-left-color: #fff !important; }
  .disco-mode .act.selected.act-now > .act-body > .act-name { color: var(--accent) !important; }
  .disco-mode .sh-sub { font-weight: 600; opacity: 1; position: relative; z-index: 30; }
  .easter-active .act { opacity: 0.95; }
  .easter-active .act.act-past { opacity: 0.70; }
  body.is-fullscreen .act,
  body.is-fullscreen .act.act-past { opacity: 1 !important; filter: none !important; }
  body.is-fullscreen .act.act-past:not(.selected):not(.act-now) { background: var(--future-act-bg) !important; border-left-color: var(--future-act-border) !important; border-top-color: var(--future-act-top) !important; }
  body.is-fullscreen .act.act-past.selected:not(.act-now) { background: var(--selected-act-bg) !important; border-left-color: var(--accent-border) !important; border-top-color: var(--selected-act-top) !important; }
  body:not(.is-fullscreen) .act.act-past.selected:not(.act-now) {
    opacity: 1;
    filter: saturate(0.92) brightness(0.94);
    background: #262626;
    border-top-color: #5f5f5f;
  }
  body.is-fullscreen .act.act-past:not(.selected)::after { display: none !important; }

const FESTIVAL_TIME_ZONE = 'Europe/Brussels';
const FESTIVAL_DTF = new Intl.DateTimeFormat('en-GB', {
  timeZone: FESTIVAL_TIME_ZONE,
  year: 'numeric', month: '2-digit', day: '2-digit',
  hour: '2-digit', minute: '2-digit', second: '2-digit',
  hourCycle: 'h23'
});

function getFestivalParts(date = getNow()) {
  const parts = Object.fromEntries(
    FESTIVAL_DTF.formatToParts(date).filter(p => p.type !== 'literal').map(p => [p.type, p.value])
  );
  return {
    year: Number(parts.year),
    month: Number(parts.month),
    monthIndex: Number(parts.month) - 1,
    day: Number(parts.day),
    hour: Number(parts.hour),
    minute: Number(parts.minute),
    second: Number(parts.second || 0)
  };
}

function getFestivalHour(cutoffHour = 0) {
  const p = getFestivalParts();
  let h = p.hour + p.minute / 60 + p.second / 3600;
  if (h < cutoffHour) h += 24;
  return h;
}

function getFestivalDateWithCutoff(cutoffHour = 0) {
  const p = getFestivalParts();
  const d = new Date(Date.UTC(p.year, p.monthIndex, p.day));
  if (p.hour < cutoffHour) d.setUTCDate(d.getUTCDate() - 1);
  return { year: d.getUTCFullYear(), monthIndex: d.getUTCMonth(), month: d.getUTCMonth() + 1, day: d.getUTCDate() };
}

function getJuly2026Day(cutoffHour, dayMap, fallback = null) {
  const d = getFestivalDateWithCutoff(cutoffHour);
  if (d.year !== 2026 || d.monthIndex !== 6) return fallback;
  return dayMap[d.day] || fallback;
}

function activeDateKey() {

function getScheduleColumnCount(gridCols) {

function setTimelineWindow(tl, startHour, endHour) {

function clearTimelineWindow(tl) {

}

function getTimelineWindow(tl, fallbackStart, fallbackEnd) {

function removeTimelineContent(tl) {

function buildGridLinesFragment(startHour, endHour) {
  const frag = document.createDocumentFragment();
  const total = endHour - startHour;
  for (let h = startHour + 1; h < endHour; h++) {
    const line = document.createElement('div');
    line.className = 'grid-line';
    line.style.top = (((h - startHour) / total) * 100) + '%';

  return frag;
}

const ACT_TEXT_LAYOUT = Object.freeze({
  top: 7,
  right: 7,
  bottom: 6,
  left: 8,
  nameMin: 12,

  nameMax: 70,
  nameWidthRatio: 0.95,
  nameHeightRatio: 0.90,
  nameLineHeight: 0.98,
  timeSizeByColumnCount: Object.freeze({
    1: 36,
    2: 30,
    3: 24,
    4: 20,
    5: 16,
  }),
  timeLineHeight: 1.02,
  timeMarginTop: 5,
});
let actTextLayoutRAF = 0;
const ACT_TEXT_STYLE_CACHE = new Map();

function setImportantStyle(el, prop, value) {
  if (el) el.style.setProperty(prop, value, 'important');
}

function directChildWithClass(parent, className) {
  if (!parent) return null;
  return Array.from(parent.children).find(el => el.classList && el.classList.contains(className)) || null;
}

function prepareActTextBox(act, body, name) {
  setImportantStyle(act, 'display', 'block');
  setImportantStyle(act, 'overflow', 'hidden');

  setImportantStyle(body, 'position', 'absolute');
  setImportantStyle(body, 'top', ACT_TEXT_LAYOUT.top + 'px');
  setImportantStyle(body, 'left', ACT_TEXT_LAYOUT.left + 'px');
  setImportantStyle(body, 'right', ACT_TEXT_LAYOUT.right + 'px');
  setImportantStyle(body, 'bottom', ACT_TEXT_LAYOUT.bottom + 'px');
  setImportantStyle(body, 'width', 'auto');
  setImportantStyle(body, 'height', 'auto');
  setImportantStyle(body, 'display', 'block');
  setImportantStyle(body, 'overflow', 'hidden');
  setImportantStyle(body, 'transform', 'none');
  setImportantStyle(body, 'text-align', 'left');

  setImportantStyle(name, 'position', 'static');
  setImportantStyle(name, 'display', 'inline-block');
  setImportantStyle(name, 'vertical-align', 'top');
  setImportantStyle(name, 'margin', '0');
  setImportantStyle(name, 'padding', '0');
  setImportantStyle(name, 'transform', 'none');
  setImportantStyle(name, 'white-space', 'normal');
  setImportantStyle(name, 'word-break', 'normal');
  setImportantStyle(name, 'overflow-wrap', 'normal');
  setImportantStyle(name, 'text-align', 'left');
  name.style.lineHeight = ACT_TEXT_LAYOUT.nameLineHeight;
}

function prepareActTime(time) {
  if (!time) return;
  time.classList.remove('act-time-hidden');
  setImportantStyle(time, 'position', 'absolute');
  time.style.display = 'block';
  time.style.width = 'max-content';
  time.style.maxWidth = 'none';
  setImportantStyle(time, 'left', '0');
  setImportantStyle(time, 'bottom', '0');
  setImportantStyle(time, 'margin', '0');
  setImportantStyle(time, 'padding', '0');
  setImportantStyle(time, 'transform', 'none');
  setImportantStyle(time, 'white-space', 'nowrap');
  setImportantStyle(time, 'text-align', 'left');
  time.style.lineHeight = ACT_TEXT_LAYOUT.timeLineHeight;
}

function nameFitsInBox(name, fontPx, maxWidthPx, maxHeightPx) {
  name.style.fontSize = fontPx + 'px';
  name.style.maxWidth = maxWidthPx + 'px';
  return Math.ceil(name.scrollWidth) <= Math.ceil(maxWidthPx) + 1
      && Math.ceil(name.scrollHeight) <= Math.ceil(maxHeightPx) + 1;
}

function computeNameFontSize(name, boxW, boxH) {
  const maxWidth = Math.max(1, Math.floor(boxW * ACT_TEXT_LAYOUT.nameWidthRatio));
  const maxHeight = Math.max(1, Math.floor(boxH * ACT_TEXT_LAYOUT.nameHeightRatio));
  let low = ACT_TEXT_LAYOUT.nameMin;
  let high = Math.max(low, Math.min(ACT_TEXT_LAYOUT.nameMax, boxH));
  let best = low;

  for (let i = 0; i < 8; i += 1) {
    const mid = (low + high) / 2;
    if (nameFitsInBox(name, mid, maxWidth, maxHeight)) {
      best = mid;
      low = mid;
    } else {
      high = mid;
    }
  }

  const finalSize = Math.max(ACT_TEXT_LAYOUT.nameMin, Math.floor(best * 10) / 10);
  name.style.fontSize = finalSize + 'px';
  name.style.maxWidth = maxWidth + 'px';
  return finalSize;
}

function layoutOneActText(act) {
  const body = directChildWithClass(act, 'act-body');
  const name = directChildWithClass(body, 'act-name');
  if (!act || !body || !name) return;

  prepareActTextBox(act, body, name);

  const boxW = Math.floor(act.clientWidth - ACT_TEXT_LAYOUT.left - ACT_TEXT_LAYOUT.right);
  const boxH = Math.floor(act.clientHeight - ACT_TEXT_LAYOUT.top - ACT_TEXT_LAYOUT.bottom);
  if (boxW <= 0 || boxH <= 0) return;

  setImportantStyle(body, 'max-height', boxH + 'px');

  const time = directChildWithClass(body, 'act-time');
  if (time) {
    prepareActTime(time);
    time.style.fontSize = getActTimeFontSize(act) + 'px';
  }

  const timeH = time ? Math.ceil(time.scrollHeight) : 0;
  const nameBoxH = Math.max(1, boxH - (timeH ? timeH + ACT_TEXT_LAYOUT.timeMarginTop : 0));
  computeNameFontSize(name, boxW, nameBoxH);

  if (!time) return;

  const timeTooWide = Math.ceil(time.scrollWidth) > boxW;
  const contentTooTall = Math.ceil(name.scrollHeight) > nameBoxH;
  if (timeTooWide || contentTooTall) {
    time.classList.add('act-time-hidden');
    computeNameFontSize(name, boxW, boxH);
  }
}

function updateActTextLayout() {
  document.querySelectorAll('.act').forEach(layoutOneActText);
}

function getActTextCacheKey(act, layoutKey = '') {
  return `${layoutKey || act.dataset.layoutKey || 'default'}|${act.id}`;
}

function cacheActTextStyles(layoutKey = '') {
  document.querySelectorAll('.act').forEach(act => {
    const body = directChildWithClass(act, 'act-body');
    const name = directChildWithClass(body, 'act-name');
    const time = directChildWithClass(body, 'act-time');
    if (!name) return;
    ACT_TEXT_STYLE_CACHE.set(getActTextCacheKey(act, layoutKey), {
      nameFontSize: name.style.fontSize,
      nameMaxWidth: name.style.maxWidth,
      timeFontSize: time ? time.style.fontSize : '',
      timeHidden: time ? time.classList.contains('act-time-hidden') : false,
    });
  });
}

function applyCachedActTextStyle(act, layoutKey = '') {
  const cached = ACT_TEXT_STYLE_CACHE.get(getActTextCacheKey(act, layoutKey));
  if (!cached) return;
  const body = directChildWithClass(act, 'act-body');
  const name = directChildWithClass(body, 'act-name');
  const time = directChildWithClass(body, 'act-time');
  if (name) {
    name.style.fontSize = cached.nameFontSize;
    name.style.maxWidth = cached.nameMaxWidth;
  }
  if (time) {
    time.style.fontSize = cached.timeFontSize;
    time.classList.toggle('act-time-hidden', cached.timeHidden);
  }
}

function precomputeNormalDayTextLayouts(finalDayKey) {

    renderDay(dayKey);

  renderDay(finalDayKey);

function queueActTextLayout() {

function buildStageHeader(name, sub = '', color = accentColor, subColor = '') {
  const d = document.createElement('div');
  d.className = 'stage-header';
  d.style.borderTopColor = color;

  const subStyle = subColor ? ` style="color:${subColor}"` : '';

  return d;
}

function updateStageHeaderSelectionState() {
  const stageRow = $('stage-row'), tl = $('tl');
  if (!stageRow || !tl) return;
  const headers = stageRow.querySelectorAll('.stage-header');
  const cols = tl.querySelectorAll('.stage-col');
  const isFS = document.body.classList.contains('is-fullscreen');
  const isSun = document.body.classList.contains('sun-mode');
  headers.forEach((header, i) => {
    const nameEl = header.querySelector('.sh-name');
    if (!nameEl) return;
    const fullName = nameEl.dataset.fullName || nameEl.textContent.trim();
    if (isFS) {
      nameEl.textContent = FS_STAGE_ABBREV[fullName] || fullName;
      nameEl.style.color = '#fff';
      nameEl.style.textShadow = '';
      header.classList.remove('sh-bar-glow');
      return;
    }
    nameEl.textContent = fullName;
    const col = cols[i];
    const hasTarget = col && col.querySelector('.act.selected');
    const selectedColor = isSun ? accentColor : '#fff';
    if (discoMode) {
      nameEl.style.color = header.dataset.nameColor || '';
      nameEl.style.textShadow = hasTarget ? '0 0 14px #fff, 0 0 6px #fff' : '';
    } else {
      nameEl.style.color = hasTarget ? selectedColor : (header.dataset.nameColor !== accentColor ? header.dataset.nameColor : '');
      nameEl.style.textShadow = '';
    }
    header.classList.toggle('sh-bar-glow', !!hasTarget);
  });
}

function buildStageHeaderFragment(stages, headerBuilder) {
  const frag = document.createDocumentFragment();
  frag.appendChild(document.createElement('div'));
  stages.forEach(stage => frag.appendChild(headerBuilder(stage)));
  return frag;
}

function buildAxisFragment(startHour, endHour) {
  const totalMin = (endHour - startHour) * 60;
  const frag = document.createDocumentFragment();
  for (let h = startHour; h < endHour; h++) {
    const span = document.createElement('span');
    span.className = 'tick-label';
    span.textContent = fmtAxisH(h);
    span.style.top = (((h - startHour) * 60 / totalMin) * 100) + '%';
    frag.appendChild(span);
  }
  return frag;
}

function positionAct(div, start, end, startHour, endHour) {
  const totalMin = (endHour - startHour) * 60;
  const topPct = ((start - startHour) * 60 / totalMin) * 100;
  const heightPct = ((end - start) * 60 / totalMin) * 100;
  div.style.top = topPct + '%';
  div.style.height = `calc(${heightPct}% - ${TIMELINE_GAP}px)`;
}

function getActsFromOverrides(dayKey, stageName, entries = Object.entries(overrides)) {
  return entries
    .reduce((list, [key, ov]) => {
      const [d, stage, startStr] = key.split('|');
      if (d !== dayKey || stage !== stageName) return list;
      const start = parseFloat(startStr);
      if (!Number.isFinite(start)) return list;
      list.push({ name: ov.name || '', start, end: typeof ov.end === 'number' ? ov.end : start + 1 });
      return list;
    }, [])
    .sort((a, b) => a.start - b.start);
}

function parseCSVRow(row) {
  const result = [];
  let cur = '';
  let inQ = false;
  for (let i = 0; i < row.length; i++) {
    const ch = row[i];
    if (ch === '"') { inQ = !inQ; }
    else if ((ch === ',' || ch === '\t') && !inQ) { result.push(cur.trim()); cur = ''; }
    else { cur += ch; }
  }
  result.push(cur.trim());
  return result;
}

function parseOverridesFromCsv(text) {
  const parsed = {};
  const parsedInfo = {};
  const parsedStyles = {};
  const rows = (text || '').trim().split(/\r?\n/).map(parseCSVRow);
  if (!rows.length) return { overrides: parsed, infoData: parsedInfo, discoStyles: parsedStyles };

  const dayNames = ['jeudi', 'vendredi', 'samedi', 'dimanche'];
  const normalizeDay = value => (value || '').trim().toLowerCase();

  rows.forEach(row => {
    const values = row.map(v => (v || '').trim());
    if (!values.some(v => v)) return;

    let index = 0;
    while (index < values.length) {
      const rawValue = values[index] || '';
      const day = normalizeDay(rawValue);

      if (dayNames.includes(day)) {
        const stage = values[index + 1] || '';
        const start = values[index + 2] || '';
        const end = values[index + 3] || '';
        const name = values[index + 4] || '';

        if (day && stage && start) {
          const stageNorm = stage.toLowerCase();
          if (stageNorm === 'camping') {
            let s = parseTimeStr(start), e = parseTimeStr(end);
            if (!isNaN(s)) {
              if (s < 6) s += 24;
              if (!isNaN(e) && e < 6) e += 24;
              if (!parsedInfo[day]) parsedInfo[day] = [];
              parsedInfo[day].push({ label: name || '', start: s, end: isNaN(e) ? null : e });
            }
          } else if ((stageNorm === 'discor' || stageNorm === 'discob' || stageNorm === 'discog') && start.toLowerCase() === 'genre') {
            const canonical = stageNorm === 'discor' ? 'DiscoR' : stageNorm === 'discob' ? 'DiscoB' : 'DiscoG';
            if (!parsedStyles[day]) parsedStyles[day] = {};
            parsedStyles[day][canonical] = values.slice(index + 3).find(v => v !== '') || '';
          } else {
            const startNum = parseTimeStr(start);
            const endNum = parseTimeStr(end) || null;
            if (!isNaN(startNum)) {
              const key = `${day}|${stage}|${startNum}`;
              parsed[key] = { name: name || '', end: isNaN(endNum) ? null : endNum };
            }
          }
        }

        index += 5;
        while (index < values.length && !(values[index] || '').trim()) {
          index += 1;
        }
        continue;
      }

      index += 1;
    }
  });

  return { overrides: parsed, infoData: parsedInfo, discoStyles: parsedStyles };
}

const CSV_CACHE_KEY = 'sheet_csv';

async function fetchSheetCsv() {
  const ctrl = new AbortController();
  const tid = setTimeout(() => ctrl.abort(), 5000);
  try {
    const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`, { signal: ctrl.signal });
    clearTimeout(tid);
    if (!res.ok) throw new Error(res.status);
    return await res.text();
  } catch(e) {
    clearTimeout(tid);
    return null;
  }
}

function applySheetCsv(text) {
  ({ overrides, infoData, discoStyles } = parseOverridesFromCsv(text));
}

function rerenderSchedule() {
  if (discoMode) {
    renderDisco(discoDayKey);
    queueActTextLayout();
  } else if (campingMode) {
    renderCamping(campingDayKey);
  } else if (favsOnly) {
    renderFavsMode(normalDayKey);
  } else {
    renderDay(normalDayKey);
  }
  updateNowLine();
  updateCampingBtn();
}

async function refreshSheetInBackground(cachedText) {
  const text = await fetchSheetCsv();
  if (!text || text === cachedText) return;
  localStorage.setItem(CSV_CACHE_KEY, text);
  applySheetCsv(text);
  rerenderSchedule();
}

async function loadOverrides() {
  if (!SHEET_ID) return;

  const cached = localStorage.getItem(CSV_CACHE_KEY);
  if (cached) {
    try { applySheetCsv(cached); } catch(e) {}
    refreshSheetInBackground(cached);
    return;
  }

  const text = await fetchSheetCsv();
  if (!text) { sheetLoadFailed = true; return; }
  localStorage.setItem(CSV_CACHE_KEY, text);
  applySheetCsv(text);
}

function getTimeZoneOffsetMinutes(date, timeZone) {
  const parts = getFestivalParts(date);
  const asUTC = Date.UTC(parts.year, parts.monthIndex, parts.day, parts.hour, parts.minute, parts.second);
  return (asUTC - date.getTime()) / 60000;
}

function zonedTimeToDate(year, month, day, hour, minute, second, timeZone) {
  const utcGuess = new Date(Date.UTC(year, month - 1, day, hour, minute, second));
  const offset1 = getTimeZoneOffsetMinutes(utcGuess, timeZone);
  const adjusted = new Date(utcGuess.getTime() - offset1 * 60000);
  const offset2 = getTimeZoneOffsetMinutes(adjusted, timeZone);
  return new Date(utcGuess.getTime() - offset2 * 60000);
}

function parseFestivalDateParam(raw) {
  const value = String(raw || '').trim();
  if (/[zZ]|[+-]\d{2}:?\d{2}$/.test(value)) {
    const d = new Date(value);
    return isNaN(d) ? null : d;
  }
  const m = value.match(/^(\d{4})-(\d{2})-(\d{2})(?:[T ](\d{1,2})(?::(\d{2}))?(?::(\d{2}))?)?$/);
  if (!m) {
    const d = new Date(value);
    return isNaN(d) ? null : d;
  }
  const [, y, mo, d, h = '0', mi = '0', se = '0'] = m;
  return zonedTimeToDate(Number(y), Number(mo), Number(d), Number(h), Number(mi), Number(se), FESTIVAL_TIME_ZONE);
}

function getNow() {
  const p = new URLSearchParams(location.search).get('t');
  if (!p) return new Date();
  return parseFestivalDateParam(p) || new Date();
}

function ymd(date = getNow()) {
  const p = getFestivalParts(date);
  return `${p.year}-${String(p.month).padStart(2,'0')}-${String(p.day).padStart(2,'0')}`;
}

function parseTimeStr(str) {
  const s = (str || '').trim().replace(',', '.');
  if (s.includes(':')) {
    const [hPart, mPart] = s.split(':');
    const h = parseInt(hPart, 10), m = parseInt(mPart, 10);
    if (!isNaN(h) && !isNaN(m)) return h + m / 60;
  }
  return parseFloat(s);
}

function formatHourParts(h) {
  const hh = h >= 24 ? h - 24 : h;
  const totalMin = Math.round((h % 1) * 60);
  return {
    hour: String(Math.floor(hh)).padStart(2, '0'),
    minute: String(totalMin).padStart(2, '0'),
  };
}

function fmtAxisH(h) {
  const { hour, minute } = formatHourParts(h);
  return `${hour}:${minute}`;
}

function fmtActH(h) {
  const { hour, minute } = formatHourParts(h);
  return `${hour} : ${minute}`;
}

function fmtActTimeRange(start, end) {
  return `${fmtActH(start)} - ${fmtActH(end)}`;
}

function fmtSummaryDuration(minutes) {
  if (minutes < 60) return `${minutes}MIN`;
  const h = Math.floor(minutes / 60);
  const m = minutes % 60;
  return m === 0 ? `${h}H` : `${h}H${String(m).padStart(2, '0')}`;
}

function fmtSummaryDurationZh(minutes) {
  if (minutes < 60) return `${minutes}分钟`;
  const h = Math.floor(minutes / 60);
  const m = minutes % 60;
  return m === 0 ? `${h}小时` : `${h}小时${m}分`;
}

function getNowSummaryCopy(mode, minutes = null) {
  const dur = minutes === null ? null : fmtSummaryDuration(minutes);
  const durZh = minutes === null ? null : fmtSummaryDurationZh(minutes);
  const copy = {

      now: 'EN CE MOMENT',
      next: dur === null ? 'À VENIR' : `DANS ${dur}`,
    },
    en: {
      now: 'PLAYING NOW',
      next: dur === null ? 'UP NEXT' : `IN ${dur}`,
    },
    zh: {
      now: '正在演出',
      next: durZh === null ? '即将开始' : `${durZh}后`,
    },
  };
  const langCopy = copy[currentLang] || copy.en;
  return mode === 'now' ? langCopy.now : langCopy.next;
}

function formatNowSummaryRow(meta) {

function renderNowSummarySection(kicker, acts) {

  return `<div class="summary-section"><span class="summary-kicker">${kicker}</span><div class="summary-list">${rows}</div></div>`;

function getUpcomingSummaryGroups(acts, hour, budget) {
  if (budget < 2) return [];
  const selected = acts
    .map(act => ({ ...getActSummaryMeta(act), selected: act.classList.contains('selected') }))
    .filter(meta => meta && meta.name && meta.start > hour && meta.selected)
    .sort((a, b) => a.start - b.start || stagePriority(a.stage) - stagePriority(b.stage));
  if (!selected.length) return [];

  // Group consecutive acts by start time
  const groups = [];
  let i = 0;
  while (i < selected.length) {
    const t = selected[i].start;
    const minutes = Math.max(0, Math.ceil((t - hour) * 60 - 1e-6));
    if (minutes > 720) break;
    const groupActs = [];
    while (i < selected.length && Math.abs(selected[i].start - t) < 0.0001) groupActs.push(selected[i++]);
    groups.push({ minutes, acts: groupActs.sort((a, b) => stagePriority(a.stage) - stagePriority(b.stage) || a.name.localeCompare(b.name)) });
  }
  if (!groups.length) return [];

  const result = [];
  let remaining = budget;
  for (const group of groups) {
    if (remaining < 2) break;
    const actsToShow = group.acts.slice(0, remaining - 1);
    result.push({ kicker: getNowSummaryCopy('next', group.minutes), acts: actsToShow });
    remaining -= 1 + actsToShow.length;
  }
  return result;
}

function updateNowSummary(hour = null) {
  if (document.body.classList.contains('is-fullscreen')) { setNowSummary(''); return; }
  const acts = getRenderedActs();
  if (!acts.length || !Number.isFinite(hour)) { setNowSummary(''); return; }
  if (hour % 24 < 12) { setNowSummary(''); return; }

  const MAX_LINES = 6;
  const visibleNowActs = acts
    .filter(act => act.classList.contains('act-now'))
    .map(act => ({ ...getActSummaryMeta(act), selected: act.classList.contains('selected') }))
    .filter(meta => meta && meta.name && meta.selected)
    .sort((a, b) => stagePriority(a.stage) - stagePriority(b.stage) || a.name.localeCompare(b.name));

  let html = '';
  let remaining = MAX_LINES;

  if (visibleNowActs.length) {
    const nowSlice = visibleNowActs.slice(0, remaining - 1);
    html += renderNowSummarySection(getNowSummaryCopy('now'), nowSlice);
    remaining -= 1 + nowSlice.length;
  }

  for (const group of getUpcomingSummaryGroups(acts, hour, remaining)) {
    html += renderNowSummarySection(group.kicker, group.acts);
  }

  setNowSummary(html);
}

function getFavStageActs(dayKey, favs = getFavs(), overrideEntries = Object.entries(overrides)) {
  const day = DAYS[dayKey];
  if (!day) return [];
  return day.stages
    .map(stage => ({
      stage,
      acts: getActsFromOverrides(dayKey, stage.name, overrideEntries)
        .filter(act => favs.includes(`${dayKey}-${stage.name}-${act.start}`))
    }))
    .filter(s => s.acts.length > 0);
}

function renderFavsMode(preferredDay = normalDayKey) {

function renderFavs(dayKey) {
  const day = DAYS[dayKey];
  if (!day) return;

  const favs = getFavs();
  const stageActs = getFavStageActs(dayKey, favs);
  if (!stageActs.length) {
    clearSchedule($('stage-row'), $('axis'), $('tl'));
    return;
  }

  const N = stageActs.length;

  const allSelected = stageActs.flatMap(s => s.acts);
  let startHour = Math.floor(Math.min(...allSelected.map(a => a.start)));
  let endHour   = Math.ceil(Math.max(...allSelected.map(a => a.end)));
  const MIN_RANGE = 2;
  if (endHour - startHour < MIN_RANGE) {
    const pad = (MIN_RANGE - (endHour - startHour)) / 2;
    startHour = Math.max(day.startHour, Math.floor(startHour - pad));
    endHour   = Math.min(day.endHour,   Math.ceil(endHour   + pad));
  }

  const stageRow = $('stage-row'), tl = $('tl'), axis = $('axis');
  document.body.classList.remove(...DAY_KEYS.map(d => 'day-' + d));
  document.body.classList.add('day-' + dayKey);

  setScheduleGrid(stageRow, tl, `60px ${'1fr '.repeat(N).trim()}`);
  setTimelineWindow(tl, startHour, endHour);

  const stageFrag    = buildStageHeaderFragment(stageActs.map(s => s.stage), s => buildStageHeader(s.name, s.sub));
  const axisFrag     = buildAxisFragment(startHour, endHour);
  const timelineFrag = document.createDocumentFragment();

  stageActs.forEach(({ stage, acts }) => {
    const col = document.createElement('div');
    col.className = 'stage-col';
    acts.forEach(act => {
      const div = createActElement({
        id: `${dayKey}-${stage.name}-${act.start}`,
        name: act.name, start: act.start, end: act.end,
        className: 'act' + (act.name === 'RuneScape Rave' ? ' act-runescape' : ''),
        favs,
      });
      positionAct(div, act.start, act.end, startHour, endHour);
      col.appendChild(div);
    });
    timelineFrag.appendChild(col);
  });

  swapSchedule(stageRow, axis, tl, stageFrag, axisFrag, timelineFrag, startHour, endHour);
  updateNowLine();
  updateResetBtn();
}

function renderDay(dayKey) {
  const day = DAYS[dayKey];
  const stageRow = $('stage-row');
  const tl = $('tl');
  const axis = $('axis');
  const favs = getFavs();
  const overrideEntries = Object.entries(overrides);

  document.body.classList.remove(...DAY_KEYS.map(d => 'day-' + d));
  document.body.classList.add('day-' + dayKey);
  setScheduleGrid(stageRow, tl, day.gridCols);
  setTimelineWindow(tl, day.startHour, day.endHour);

  const stageFrag = buildStageHeaderFragment(day.stages, s => buildStageHeader(s.name, s.sub));
  const axisFrag = buildAxisFragment(day.startHour, day.endHour);
  const timelineFrag = document.createDocumentFragment();

  day.stages.forEach(stage => {
    const col = document.createElement('div');
    col.className = 'stage-col';

    getActsFromOverrides(dayKey, stage.name, overrideEntries).forEach(act => {
      const div = createActElement({
        id: `${dayKey}-${stage.name}-${act.start}`,
        name: act.name,
        start: act.start,
        end: act.end,
        className: 'act' + (act.name === 'RuneScape Rave' ? ' act-runescape' : ''),
        favs,
        layoutKey: dayKey,
      });
      positionAct(div, act.start, act.end, day.startHour, day.endHour);
      col.appendChild(div);
    });

    timelineFrag.appendChild(col);
  });

  swapSchedule(stageRow, axis, tl, stageFrag, axisFrag, timelineFrag, day.startHour, day.endHour);
  updateNowLine();
  updateResetBtn();
}

function getDiscoActs(dayKey) {
  const result = { DiscoR: [], DiscoB: [], DiscoG: [] };

  Object.entries(overrides).forEach(([key, ov]) => {
    const [d, stage, startStr] = key.split('|');
    if (d !== dayKey) return;

    const norm = stage.toLowerCase();
    const bucket = norm === 'discor' ? 'DiscoR' : norm === 'discob' ? 'DiscoB' : norm === 'discog' ? 'DiscoG' : null;
    if (!bucket) return;

    const rawStart = parseFloat(startStr);
    if (!Number.isFinite(rawStart)) return;
    const rawEnd = typeof ov.end === 'number' ? ov.end : rawStart + 1;
    result[bucket].push({
      name: ov.name || '',
      start: rawStart < 6 ? rawStart + 24 : rawStart,
      end: rawEnd < 6 ? rawEnd + 24 : rawEnd,
    });
  });

  Object.values(result).forEach(list => list.sort((a, b) => a.start - b.start));
  return result;
}

function renderDisco(dayKey) {
  const acts = getDiscoActs(dayKey);
  const stageRow = $('stage-row');
  const tl = $('tl');
  const axis = $('axis');
  const favs = getFavs();
  const dayStyles = discoStyles[dayKey] || {};

  const stages = Object.entries(DISCO_STAGE_META)
    .map(([key, meta]) => ({ key, ...meta, label: meta.labels[currentLang], style: dayStyles[key] || '' }))
    .filter(stage => acts[stage.key].some(a => a.name !== ''));

  const allActs = stages.flatMap(stage => acts[stage.key]);
  const gridCols = `60px ${'1fr '.repeat(Math.max(stages.length, 1)).trim()}`;
  setScheduleGrid(stageRow, tl, gridCols);

  const stageFrag = buildStageHeaderFragment(stages, stage => buildStageHeader(stage.label, stage.style, stage.color, stage.color));
  if (!allActs.length) {
    clearSchedule(stageRow, axis, tl);
    stageRow.appendChild(stageFrag);
    return;
  }

  const startHour = Math.floor(Math.min(...allActs.map(a => a.start)));
  const endHour = Math.ceil(Math.max(...allActs.map(a => a.end)));
  discoHours = { start: startHour, end: endHour };
  setTimelineWindow(tl, startHour, endHour);

  const axisFrag = buildAxisFragment(startHour, endHour);
  const timelineFrag = document.createDocumentFragment();

  stages.forEach(stage => {
    const col = document.createElement('div');
    col.className = 'stage-col';

    acts[stage.key].forEach(act => {
      if (!act.name) return;
      const div = createActElement({
        id: `${dayKey}-${stage.key}-${act.start}`,
        name: act.name,
        start: act.start,
        end: act.end,
        className: `act ${stage.cssClass}`,
        borderLeftColor: stage.color,
        favs,
        favMode: 'disco',
      });
      positionAct(div, act.start, act.end, startHour, endHour);
      col.appendChild(div);
    });

    timelineFrag.appendChild(col);
  });

  swapSchedule(stageRow, axis, tl, stageFrag, axisFrag, timelineFrag, startHour, endHour);
  updateNowLine();
  updateResetBtn();
}

function updateResetBtn() {

}

function isInfoItemActive(item, h) {
  const start = Number(item && item.start);
  const end = Number(item && item.end);

  if (!Number.isFinite(start) || !Number.isFinite(end)) return false;

  return start <= h && h < end;
}

function isSilentDiscoInfoItem(item) {
  const label = String(item && item.label || '')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .toLowerCase();
  return /silent\s*disco/.test(label);
}

function isInfoCurrentlyActive() {
  const h = getFestivalHour(6);
  const dayKey = getCurrentInfoDay();
  if (!dayKey) return false;
  const items = infoData[dayKey] || [];
  return items.some(item => !isSilentDiscoInfoItem(item) && isInfoItemActive(item, h));
}

function getCurrentDiscoState() {
  const p = getFestivalParts();
  const active = p.year === 2026 && p.monthIndex === 6 && p.hour >= 0 && p.hour < 6;
  if (!active) return { active: false, inPeak: false, dayKey: null };

  const dayKey = DISCO_NIGHT_DAYS[p.day] || null;
  return dayKey ? { active: true, inPeak: true, dayKey } : { active: false, inPeak: false, dayKey: null };
}

function updateDiscoBtn() {
  const btn = $('disco-btn');
  if (!btn) return false;
  const state = getCurrentDiscoState();
  setUtilityButtonState(btn, state.active, discoMode);
  return state.active;
}

function updateCampingBtn() {
  const btn = $('camping-btn');
  if (!btn) return false;
  const hasActive = isInfoCurrentlyActive();
  setUtilityButtonState(btn, hasActive, campingMode);
  return hasActive;
}

function renderCamping(dayKey) {
  const stageRow = $('stage-row');
  const tl = $('tl');
  const axis = $('axis');
  clearSchedule(stageRow, axis, tl);
  setScheduleGrid(stageRow, tl, '60px 1fr');

  stageRow.appendChild(stageFrag);

  col.className = 'stage-col info-col';

  const h = getFestivalHour(6);

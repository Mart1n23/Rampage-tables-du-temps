<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0d0d">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&family=Comic+Neue:wght@400;700&family=Share+Tech+Mono&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    background: #0d0d0d;
    width: 100%; height: 100%;
    overflow: hidden;
  }

  :root {
    --accent: #eb0028;
    --accent-bg: #4b000e;
    --accent-border: #eb0028;
    --fs-top-pad: 10px;
    --fs-bottom-pad: 30px;
    --fs-text-boost: 1;
    --fs-left-pad: 90px;
    --fs-right-pad: 90px;
    --header-gap: 6px;
    --day-date-gap: 3px;
    --day-date-pull: -10px;
    --muted-time: #ffffff88;
    --font-scale: 1;
    --artist-font-scale: 1;
    --artist-lg6-size: 34px;
    --artist-lg7-size: 32px;
    --artist-semi-size: 30px;
    --artist-size: 25px;
    --artist-md-size: 27px;
    --artist-long-size: 23px;
    --artist-xl-size: 22px;
    --artist-long-b-size: 21px;
    --act-time-size: 20px;
    --act-time-mt: 5px;
    --scene-name-size: 21px;
    --edge-gap: 24px;
    --bottom-btn-size: 149px;
    --popover-btn-size: 119.2px;
    --color-option-size: 95px;
  }

  body.day-jeudi,
  body.disco-mode {
    --font-scale: 1.666667;
    --artist-font-scale: 1.52;
  }

  body {
    background: transparent; color: #fff;
    font-family: 'Inter', sans-serif;
    width: 100vw; height: 100dvh;
    overflow: hidden; position: relative;
    opacity: 0; transition: opacity 0.2s;
  }

  .bg-full {
    position: fixed;
    inset: 0;
    background:
      linear-gradient(to bottom,
        #0d0d0d 0%,
        transparent 15%,
        transparent 85%,
        #0d0d0d 100%
      ),
      radial-gradient(ellipse at 50% 50%, rgba(235, 0, 40, 0.4) 0%, #0d0d0d 70%);
    z-index: 0;
  }

  #scaler {
    position: absolute;
    width: 1080px;
    height: 1920px;
    transform-origin: top left;
    z-index: 1;
  }

  .easter-img {
    position: absolute; top: 0; left: 0;
    width: 1080px; height: 1920px;
    object-fit: cover; pointer-events: none; z-index: 0;
  }
  .easter-img.contain { object-fit: contain; object-position: top center; }
  #fr-img {
    top: auto;
    bottom: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center bottom;
  }
  #disco-img { width: 540px; height: 960px; left: 270px; }

  .round-btn {
    border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    user-select: none; -webkit-user-select: none;
  }
  #right-panel { display: none; }
  .top-btn { width: var(--popover-btn-size); height: var(--popover-btn-size); }
  .bottom-btn { width: var(--bottom-btn-size); height: var(--bottom-btn-size); }
  .top-btn, .bottom-btn { border: 2px solid #ffffff30; background: #ffffff12; opacity: 0.85; }
  #settings-popover {
    position: absolute; right: calc((var(--bottom-btn-size) - var(--popover-btn-size)) / 2); bottom: 182px;
    display: none; flex-direction: column; align-items: center; gap: 17px;
    z-index: 40; pointer-events: none;
  }
  #bottom-bar.settings-open #settings-popover { display: flex; }
  #settings-popover > *, #settings-popover .top-btn, #settings-popover .color-option { pointer-events: auto; }
  #settings-popover .top-btn { box-shadow: 0 10px 28px rgba(0,0,0,0.45); backdrop-filter: blur(8px); }
  #bottom-bar.settings-open #settings-btn { opacity: 1; border-color: rgba(255,255,255,0.72); background: var(--accent-bg); }
  #reset-wrap { display: none; position: relative; }
  #reset-label {
    display: none; position: absolute; top: 50%; right: calc(100% + 14px); transform: translateY(-50%);
    font: 64px 'Bebas Neue', sans-serif; color: #ff4444; letter-spacing: 3px; white-space: nowrap;
  }
  #reset-btn { border-color: #ffffff30; }
  #lang-btn {
    font: 89px/1 'Bebas Neue', sans-serif; letter-spacing: 1px; color: #fff;
    -webkit-touch-callout: none;
    padding-top: 5px; text-align: center;
  }
  #camping-btn { font: 109px 'Bebas Neue', sans-serif; color: #fff; }
  #fs-btn, #settings-btn { background: var(--accent-bg); }
  #settings-btn svg { width: 98px; height: 98px; }
  .info-col { display: flex; flex-direction: column; gap: 14px; padding: 16px 0; }

  .content {
    position: relative; z-index: 1;
    padding: 25px 62px 100px;
    height: 100%; display: flex; flex-direction: column;
  }

  #bottom-bar {
    position: absolute;
    left: var(--edge-gap); right: var(--edge-gap); bottom: var(--edge-gap);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0;
    flex-shrink: 0; z-index: 30;
    pointer-events: none;
    opacity: 0.85;
  }
  #left-btns, #right-btns { display: flex; align-items: center; gap: 33px; }
  #right-btns { position: relative; }
  #bottom-bar .bottom-btn {
    pointer-events: auto;
    box-shadow: 0 10px 28px rgba(0,0,0,0.45);
    backdrop-filter: blur(8px);
  }
  .is-fullscreen #bottom-bar { display: none !important; }

  .is-fullscreen .content {
    padding: var(--fs-top-pad, 10px) var(--fs-right-pad, 90px) var(--fs-bottom-pad, 30px) var(--fs-left-pad, 90px);
  }
  .is-fullscreen .top-bar { margin-bottom: calc(var(--header-gap, 6px) * var(--fs-text-boost, 1)); }
  .is-fullscreen .top-bar > div:first-child { display: flex; flex-direction: column; min-width: 0; }

  .top-bar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }

  #color-slot { position: relative; }
  .color-btn {
    width: var(--popover-btn-size); height: var(--popover-btn-size); border-radius: 50%;
    background: var(--accent); border: 2px solid #ffffff30;
    cursor: pointer; flex-shrink: 0; opacity: 0.95;
    filter: saturate(0.9) brightness(0.72);
  }
  .color-menu {
    position: absolute; right: calc(100% + 12px); top: 50%; transform: translateY(-50%);
    display: none; flex-direction: row; gap: 8px; z-index: 100;
  }
  .color-menu.open { display: flex; }
  .color-option { width: var(--color-option-size); height: var(--color-option-size); border-radius: 50%; cursor: pointer; border: 3px solid transparent; filter: saturate(1) brightness(0.8); }
  .color-option:hover, .color-option.current { border-color: #fff; filter: saturate(1) brightness(0.8); }

  .label { font-size: 22px; letter-spacing: 5px; color: var(--accent); text-transform: uppercase; margin-bottom: var(--header-gap, 6px); cursor: pointer; display: flex; align-items: center; gap: 28px; }
  #days-left { font-family: 'Bebas Neue', sans-serif; font-size: 34px; letter-spacing: 3px; color: var(--accent); opacity: 0.85; flex-shrink: 0; position: relative; top: 2px; }
  .is-fullscreen #days-left { display: none; }
  .is-fullscreen .day-item:not(.active) { display: none; }
  .disco-mode .day-item[data-day="jeudi"] { display: none; }
  .day-row { display: flex; align-items: flex-end; gap: 20px; height: 94px; flex-shrink: 0; }
  .day-item {
    font-family: 'Bebas Neue', sans-serif; line-height: 1;
    cursor: pointer; white-space: nowrap; user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: color 0.2s, font-size 0.2s;
    color: #ffffff22; font-size: 40px; padding-bottom: 6px;
  }
  .day-item.active { color: #fff; font-size: 90px; padding-bottom: 0; }
  .lang-zh .day-item { font-size: 38px; }
  .lang-zh .day-item.active { font-size: 82px; }
  .day-date { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--muted-time, #ffffff88); letter-spacing: 6px; margin-top: calc(var(--day-date-gap, 3px) + var(--day-date-pull, -10px)); margin-bottom: 12px; }

  .is-fullscreen .label {
    position: relative; z-index: 2; line-height: 1.05;
    font-size: calc(22px * var(--fs-text-boost, 1));
    letter-spacing: calc(5px * var(--fs-text-boost, 1));
    margin-bottom: calc(2px * var(--fs-text-boost, 1));
  }
  .is-fullscreen .day-row {
    position: relative; z-index: 1; margin-top: 0;
    gap: calc(20px * var(--fs-text-boost, 1));
    height: calc(100px * var(--fs-text-boost, 1));
  }
  .is-fullscreen .day-item {
    font-size: calc(40px * var(--fs-text-boost, 1));
    padding-bottom: calc(6px * var(--fs-text-boost, 1));
  }
  .is-fullscreen .day-item.active {
    font-size: calc(90px * var(--fs-text-boost, 1));
    padding-bottom: 0;
  }
  .lang-zh.is-fullscreen .day-item { font-size: calc(38px * var(--fs-text-boost, 1)); }
  .lang-zh.is-fullscreen .day-item.active { font-size: calc(82px * var(--fs-text-boost, 1)); }
  .is-fullscreen .day-date {
    font-size: calc(36px * var(--fs-text-boost, 1));
    letter-spacing: calc(6px * var(--fs-text-boost, 1));
    margin-top: calc((var(--day-date-gap, 3px) + var(--day-date-pull, -10px)) * var(--fs-text-boost, 1));
    margin-bottom: calc(var(--header-gap, 6px) * var(--fs-text-boost, 1));
  }

  .stage-row { display: grid; gap: 0 7px; margin-bottom: 6px; flex-shrink: 0; height: 74px; overflow: hidden; }
  .disco-mode .stage-row { overflow: visible; position: relative; z-index: 20; }
  .disco-mode .timeline { position: relative; z-index: 1; }
  .disco-mode .stage-header { position: relative; z-index: 25; }
  .stage-header { border-top: 2px solid var(--accent); padding-top: 6px; }
  .sh-name { font-size: calc(var(--scene-name-size) * var(--font-scale, 1)); font-weight: 700; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }
  .sh-sub { font-size: 18px; color: #ffffff66; margin-top: 2px; }

  .timeline { flex: 1; display: grid; gap: 0 7px; position: relative; min-height: 0; }

  .time-axis { position: relative; }
  .tick-label {
    position: absolute; right: 8px;
    font-family: 'Share Tech Mono', 'Inter', monospace;
    font-size: 27px; font-weight: 400;
    color: var(--muted-time, #ffffff88); letter-spacing: 1px;
    font-variant-numeric: tabular-nums;
    transform: translateY(-50%);
  }

  .stage-col { position: relative; }

  .act {
    position: absolute; left: 0; right: 0;
    border-radius: 3px; padding: 7px 7px 6px 8px; gap: 2px;
    background: #1c1c1c; border-left: 3px solid #444; border-top: 1px solid #2a2a2a;
    overflow: visible; cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent; user-select: none;
    box-sizing: border-box;
    display: flex; flex-direction: column;
  }
  .act.selected { background: var(--accent-bg); border-left: 3px solid var(--accent-border); }
  .act.selected::before { content: ''; position: absolute; inset: 0; background: var(--accent); opacity: 0.15; border-radius: inherit; pointer-events: none; }
  body:not(.disco-mode) .act.selected.act-now {
    background: var(--accent-bg);
    border-left-color: var(--accent-border);
    border-top-color: var(--accent-border);
  }
  .act.act-now {
    background: #3f3f3f;
    border-left: 4px solid var(--accent);
    border-top-color: var(--accent);
    box-shadow: 0 0 26px rgba(255,255,255,0.36), 0 0 18px var(--accent), inset 0 0 28px rgba(255,255,255,0.14);
    filter: brightness(1.32);
  }
  .act.act-past { opacity: 0.75; }
  .act-disco-r { border-left-color: #e63939; }
  .act-disco-b { border-left-color: #3399ff; }
  .act-disco-g { border-left-color: #00c853; }
  .disco-mode .act { background: #272727; opacity: 1; }
  .disco-mode .act.act-past { opacity: 0.75; }
  .disco-mode .act.act-now {
    background: #484848;
    border-left-width: 4px;
    border-top-color: transparent;
    box-shadow: 0 0 28px rgba(255,255,255,0.42), inset 0 0 30px rgba(255,255,255,0.16);
    filter: brightness(1.34);
  }
  .disco-mode .act.selected { background: #606060; }
  .disco-mode .act.selected::before { display: none; }
  .disco-mode.is-fullscreen .act.selected { background: #737373; }
  .disco-mode .sh-sub { font-size: calc(18px * var(--font-scale, 1)); font-weight: 600; opacity: 1; position: relative; z-index: 30; overflow: visible; }
  .easter-active .act { opacity: 0.85; }
  .easter-active .act.act-past { opacity: 0.555; }
  .is-fullscreen .act,
  .is-fullscreen .act.act-past,
  .is-fullscreen.easter-visual-boost .act,
  .is-fullscreen.easter-visual-boost .act.act-past {
    opacity: 1 !important;
  }
  .disco-mode.is-fullscreen .act.act-past { opacity: 1 !important; }
  .is-fullscreen .act.act-now {
    background: #1c1c1c !important;
    border-left: 3px solid #444 !important;
    border-top: 1px solid #2a2a2a !important;
    box-shadow: none !important;
    filter: none !important;
  }
  .is-fullscreen:not(.disco-mode) .act:not(.selected),
  .is-fullscreen:not(.disco-mode) .act:not(.selected).act-now {
    border-left: 3px solid #444 !important;
    border-top: 1px solid #2a2a2a !important;
  }
  .disco-mode.is-fullscreen .act.act-now {
    background: #272727 !important;
    border-left-width: 3px !important;
    border-top: 1px solid #2a2a2a !important;
    box-shadow: none !important;
    filter: none !important;
  }
  .disco-mode.is-fullscreen .act.act-now.act-disco-r { border-left: 3px solid #e63939 !important; }
  .disco-mode.is-fullscreen .act.act-now.act-disco-b { border-left: 3px solid #3399ff !important; }
  .disco-mode.is-fullscreen .act.act-now.act-disco-g { border-left: 3px solid #00c853 !important; }
  .is-fullscreen:not(.disco-mode) .act.selected,
  .is-fullscreen:not(.disco-mode) .act.selected.act-now {
    background: var(--accent-bg) !important;
    border-left: 3px solid var(--accent-border) !important;
    border-top: 1px solid #2a2a2a !important;
    box-shadow: none !important;
    filter: none !important;
  }
  .disco-mode.is-fullscreen .act.selected.act-now {
    background: #737373 !important;
    border-left: 3px solid #fff !important;
    border-top-color: #2a2a2a !important;
    box-shadow: none !important;
    filter: none !important;
  }
  .is-fullscreen #now-line { display: none; }
  .act-name {
    display: block;
    overflow: visible;
    white-space: normal;
    word-break: normal;
    overflow-wrap: normal;
    hyphens: none;
    text-wrap: balance;
    max-width: 100%; min-width: 0;
    color: #fff; font-weight: 800; letter-spacing: -0.035em; line-height: 0.98;
    flex: 0 0 auto;
    font-size: calc(var(--name-size, var(--artist-size)) * var(--artist-font-scale, 1));
  }
  .act-name.name-lg6    { --name-size: var(--artist-lg6-size); }
  .act-name.name-lg7    { --name-size: var(--artist-lg7-size); }
  .act-name.name-semi   { --name-size: var(--artist-semi-size); }
  .act-name.name-md     { --name-size: var(--artist-md-size); }
  .act-name.name-long   { --name-size: var(--artist-long-size); }
  .act-name.name-xl     { --name-size: var(--artist-xl-size); }
  .act-name.name-long-b { --name-size: var(--artist-long-b-size); }
  .act-time {
    position: static;
    display: block;
    width: 100%;
    font-family: 'Share Tech Mono', 'Inter', monospace;
    font-size: calc(var(--act-time-size) * var(--font-scale, 1));
    font-weight: 400;
    color: var(--muted-time, #ffffff88);
    margin-top: calc(var(--act-time-mt, 4px) * var(--font-scale, 1));
    flex-shrink: 1;
    min-height: 0;
    line-height: 1.02;
    white-space: nowrap;
  }

  .act-runescape.selected::before { background: #ffffff; opacity: 0.1; }
  .runescape-active .act-runescape.selected::before,
  .runescape-unlocked .act-runescape.selected::before { background: var(--accent); opacity: 0.15; }

  .comic-sans, .comic-sans * { font-family: 'Comic Neue', 'Comic Sans MS', 'Comic Sans', cursive !important; }
  .comic-sans .day-item { font-family: 'Bebas Neue', sans-serif !important; }

  .camping-card { border-radius: 3px; padding: 22px 20px; background: #1c1c1c; border-left: 3px solid #444; border-top: 1px solid #2a2a2a; }
  .camping-card-active { background: #2a2a2a; border-left: 4px solid var(--accent); }
  .camping-label { font-size: 26px; font-weight: 700; color: #fff; }
  .camping-time { font-size: 22px; color: #ffffff88; margin-top: 6px; }

  .is-fullscreen #disco-img { opacity: 0 !important; }

  body.disco-peak #disco-btn {
    opacity: 1 !important;
    box-shadow: 0 0 22px 6px rgba(255,255,255,0.55) !important;
    border-color: rgba(255,255,255,0.9) !important;
  }
  body.disco-peak #camping-btn,
  body.disco-peak #fs-btn {
    opacity: 0.22 !important;
  }

  img[id$="-img"] { opacity: 0; transition: opacity 0.6s; }
</style>
</head>
<body>
<div class="bg-full"></div>
<div id="scaler">
<img id="shrek-img" class="easter-img" src="png/shrek.png">
<img id="alien-img" class="easter-img" src="png/alien.png">
<img id="fr-img" class="easter-img" src="png/fr.png">
<img id="en-img" class="easter-img" src="png/en.png">
<img id="zh-img" class="easter-img" src="png/zh.png">
<img id="disco-img" class="easter-img" src="png/disco.png">
<img id="runescape-img" class="easter-img contain" src="png/runescape.png">
<div class="content">

  <div class="top-bar">
    <div>
      <div class="label"><span>Rampage Open Air 2026</span><span id="days-left"></span></div>
      <div class="day-row">
        <div class="day-item active" data-day="jeudi"    data-date-fr="02 JUILLET" data-date-en="JULY 02" data-date-zh="7月2日" data-fr="JEUDI"    data-en="THURSDAY" data-zh="周四">JEUDI</div>
        <div class="day-item"        data-day="vendredi" data-date-fr="03 JUILLET" data-date-en="JULY 03" data-date-zh="7月3日" data-fr="VENDREDI"  data-en="FRIDAY"   data-zh="周五">VENDREDI</div>
        <div class="day-item"        data-day="samedi"   data-date-fr="04 JUILLET" data-date-en="JULY 04" data-date-zh="7月4日" data-fr="SAMEDI"    data-en="SATURDAY" data-zh="周六">SAMEDI</div>
        <div class="day-item"        data-day="dimanche" data-date-fr="05 JUILLET" data-date-en="JULY 05" data-date-zh="7月5日" data-fr="DIMANCHE"  data-en="SUNDAY"   data-zh="周日">DIMANCHE</div>
      </div>
      <div class="day-date" id="current-date">02 JUILLET</div>
    </div>
    <div id="right-panel"></div>
  </div>

  <div class="stage-row" id="stage-row"></div>
  <div class="timeline" id="tl">
    <div class="time-axis" id="axis"></div>
  </div>

  <div id="bottom-bar">
    <div id="left-btns">
      <div id="camping-btn" class="round-btn bottom-btn">!</div>
      <div id="disco-btn" class="round-btn bottom-btn">
      <svg width="120" height="120" viewBox="-1 -1 26 26" fill="none" stroke="#fff" stroke-width="1.2" stroke-linecap="round"><defs><clipPath id="dbc"><circle cx="12" cy="12" r="9"/></clipPath></defs><circle cx="12" cy="12" r="9"/><line x1="12" y1="0" x2="12" y2="3"/><g clip-path="url(#dbc)"><line x1="3" y1="8" x2="21" y2="8"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="16" x2="21" y2="16"/><line x1="8" y1="3" x2="8" y2="21"/><line x1="12" y1="3" x2="12" y2="21"/><line x1="16" y1="3" x2="16" y2="21"/></g><circle cx="1" cy="6" r="1" fill="#fff" stroke="none"/><circle cx="23" cy="6" r="1" fill="#fff" stroke="none"/><circle cx="0" cy="17" r="0.8" fill="#fff" stroke="none"/><circle cx="24" cy="17" r="0.8" fill="#fff" stroke="none"/></svg>
    </div>
    </div>
    <div id="right-btns">
      <div id="settings-popover" aria-hidden="true">
      <div id="reset-wrap">
        <div id="reset-label">RESET?</div>
        <div id="reset-btn" class="round-btn top-btn">
          <svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </div>
      </div>
      <div id="lang-btn" class="round-btn top-btn">FR</div>
      <div id="color-slot">

<script>
let accentColor = '#eb0028', accentBg = '#4b000e', accentBorder = '#eb0028';

function getStoredArray(key) {

function getJuly2026Day(cutoffHour, dayMap, fallback = null) {
  const now = getNow();
  const d = new Date(now);
  if (now.getHours() < cutoffHour) d.setDate(d.getDate() - 1);
  if (d.getFullYear() !== 2026 || d.getMonth() !== 6) return fallback;
  return dayMap[d.getDate()] || fallback;
}

function activeDateKey() {
  return 'date' + currentLang.charAt(0).toUpperCase() + currentLang.slice(1);
}

function setScheduleGrid(stageRow, tl, gridCols) {
  stageRow.style.gridTemplateColumns = gridCols;
  tl.style.gridTemplateColumns = gridCols;
}

function removeTimelineContent(tl) {
  tl.querySelectorAll('.stage-col, #now-line').forEach(el => el.remove());
}

function clearSchedule(stageRow, axis, tl) {
  stageRow.innerHTML = '';
  axis.innerHTML = '';
  removeTimelineContent(tl);
}

function swapSchedule(stageRow, axis, tl, stageFrag, axisFrag, timelineFrag) {
  stageRow.innerHTML = '';
  stageRow.appendChild(stageFrag);
  axis.innerHTML = '';
  axis.appendChild(axisFrag);
  removeTimelineContent(tl);
  tl.appendChild(timelineFrag);
}

function buildStageHeader(name, sub = '', color = accentColor, subColor = '') {
  const d = document.createElement('div');
  d.className = 'stage-header';
  d.style.borderTopColor = color;
  const subStyle = subColor ? ` style="color:${subColor}"` : '';
  d.innerHTML = `<div class="sh-name" style="color:${color}">${escapeHTML(name)}</div>${sub ? `<div class="sh-sub"${subStyle}>${escapeHTML(sub)}</div>` : ''}`;
  return d;
}

function buildStageHeaderFragment(stages, headerBuilder) {
  const frag = document.createDocumentFragment();
  frag.appendChild(document.createElement('div'));
  stages.forEach(stage => frag.appendChild(headerBuilder(stage)));
  return frag;
}

function buildAxisFragment(startHour, endHour) {
  const totalMin = (endHour - startHour) * 60;
  const frag = document.createDocumentFragment();
  for (let h = startHour; h <= endHour; h++) {
    const span = document.createElement('span');
    span.className = 'tick-label';
    span.textContent = fmtH(h);
    span.style.top = (((h - startHour) * 60 / totalMin) * 100) + '%';
    frag.appendChild(span);
  }
  return frag;
}

function positionAct(div, start, end, startHour, endHour) {
  const totalMin = (endHour - startHour) * 60;
  const topPct = ((start - startHour) * 60 / totalMin) * 100;
  const heightPct = ((end - start) * 60 / totalMin) * 100;
  div.style.top = topPct + '%';
  div.style.height = `calc(${heightPct}% - ${TIMELINE_GAP}px)`;
}

function getActsFromOverrides(dayKey, stageName, entries = Object.entries(overrides)) {
  return entries
    .reduce((list, [key, ov]) => {
      const [d, stage, startStr] = key.split('|');
      if (d !== dayKey || stage !== stageName) return list;
      const start = parseFloat(startStr);
      if (!Number.isFinite(start)) return list;
      list.push({ name: ov.name || '', start, end: typeof ov.end === 'number' ? ov.end : start + 1 });
      return list;
    }, [])
    .sort((a, b) => a.start - b.start);
}

function discoActColor(div) {
  if (div.classList.contains('act-disco-r')) return DISCO_STAGE_META.DiscoR.color;
  if (div.classList.contains('act-disco-b')) return DISCO_STAGE_META.DiscoB.color;
  if (div.classList.contains('act-disco-g')) return DISCO_STAGE_META.DiscoG.color;
  return null;
}

function isLockedRuneRaveAct(div) {
  return div.querySelector('.act-name')?.textContent.trim() === 'RuneScape Rave'
      && !document.body.classList.contains('runescape-active')
      && !document.body.classList.contains('runescape-unlocked');
}

function setNormalSelectedActStyle(div) {

    div.style.setProperty('--accent', '#fff');
    div.style.setProperty('--accent-bg', '#555');

    div.style.setProperty('border-left-color', '#fff', 'important');
    div.style.setProperty('border-top-color', '#2a2a2a', 'important');

  }
  div.style.setProperty('--accent', accentColor);
  div.style.setProperty('--accent-bg', accentBg);
  div.style.setProperty('--accent-border', accentBorder);
  div.style.setProperty('background', accentBg, 'important');
  div.style.setProperty('border-left-color', accentBorder, 'important');
  div.style.setProperty('border-top-color', '#2a2a2a', 'important');
}

function clearNormalSelectedActStyle(div) {
  div.style.removeProperty('--accent-bg');
  div.style.removeProperty('--accent-border');
  div.style.removeProperty('--accent');
  div.style.removeProperty('background');
  div.style.removeProperty('border-left-color');
  div.style.removeProperty('border-top-color');
}

function applySavedFavorite(div, favs, mode = 'normal') {
  if (!favs.includes(div.id)) return;
  div.classList.add('selected');
  if (mode === 'disco') return;

  setNormalSelectedActStyle(div);
}

function createActElement({ id, name, start, end, className = 'act', borderLeftColor = '', favs = [], favMode = 'normal' }) {
  const div = document.createElement('div');
  div.id = id;
  div.className = className;
  div.dataset.start = start;
  div.dataset.end = end;
  if (borderLeftColor) div.style.borderLeftColor = borderLeftColor;
  div.innerHTML = `${createActNameHTML(name)}${(end - start) >= 0.5 ? `<div class="act-time">${fmtH(start)} – ${fmtH(end)}</div>` : ''}`;
  applySavedFavorite(div, favs, favMode);
  addActBehavior(div);
  return div;
}

function parseCSVRow(row) {
  const result = [];
  let cur = '';
  let inQ = false;
  for (let i = 0; i < row.length; i++) {
    const ch = row[i];
    if (ch === '"') { inQ = !inQ; }
    else if ((ch === ',' || ch === '\t') && !inQ) { result.push(cur.trim()); cur = ''; }
    else { cur += ch; }
  }
  result.push(cur.trim());
  return result;
}

function parseOverridesFromCsv(text) {
  const parsed = {};
  infoData = {};
  discoStyles = {};
  const rows = (text || '').trim().split(/\r?\n/).map(parseCSVRow);
  if (!rows.length) return parsed;

  const dayNames = ['jeudi', 'vendredi', 'samedi', 'dimanche'];
  const normalizeDay = value => (value || '').trim().toLowerCase();

  rows.forEach(row => {
    const values = row.map(v => (v || '').trim());
    if (!values.some(v => v)) return;

    let index = 0;
    while (index < values.length) {
      const rawValue = values[index] || '';
      const day = normalizeDay(rawValue);

      if (dayNames.includes(day)) {
        const stage = values[index + 1] || '';
        const start = values[index + 2] || '';
        const end = values[index + 3] || '';
        const name = values[index + 4] || '';

        if (day && stage && start) {
          const stageNorm = stage.toLowerCase();
          if (stageNorm === 'camping') {
            let s = parseTimeStr(start), e = parseTimeStr(end);
            if (!isNaN(s)) {
              if (s < 6) s += 24;
              if (!isNaN(e) && e < 6) e += 24;
              if (!infoData[day]) infoData[day] = [];
              infoData[day].push({ label: name || '', start: s, end: isNaN(e) ? null : e });
            }
          } else if ((stageNorm === 'discor' || stageNorm === 'discob' || stageNorm === 'discog') && start.toLowerCase() === 'genre') {
            const canonical = stageNorm === 'discor' ? 'DiscoR' : stageNorm === 'discob' ? 'DiscoB' : 'DiscoG';
            if (!discoStyles[day]) discoStyles[day] = {};
            discoStyles[day][canonical] = values.slice(index + 3).find(v => v !== '') || '';
          } else {
            const startNum = parseTimeStr(start);
            const endNum = parseTimeStr(end) || null;
            if (!isNaN(startNum)) {
              const key = `${day}|${stage}|${startNum}`;
              parsed[key] = { name: name || '', end: isNaN(endNum) ? null : endNum };
            }
          }
        }

        index += 5;
        while (index < values.length && !(values[index] || '').trim()) {
          index += 1;
        }
        continue;
      }

      index += 1;
    }
  });

  return parsed;
}

async function loadOverrides() {
  if (!SHEET_ID) return overrides;

  try {
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), 5000);
    const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`, { signal: ctrl.signal });
    clearTimeout(tid);
    if (!res.ok) throw new Error(res.status);
    const text = await res.text();
    overrides = parseOverridesFromCsv(text);
  } catch (e) {
    console.warn('Impossible de charger les overrides depuis le Google Sheet', e);
  }

  return overrides;
}

};

  return {
    gridCols: `60px ${'1fr '.repeat(stages.length).trim()}`,

    endHour,
    stages: stages.map(([name, sub = '']) => ({ name, sub }))

}

    ['Dome', 'By Radar'],

  ]),
};

function getNow() {
  const p = new URLSearchParams(location.search).get('t');
  if (!p) return new Date();
  const normalized = p.split(':').length === 2 ? p + ':00' : p;
  const d = new Date(normalized);
  return isNaN(d) ? new Date() : d;
}

function ymd(date) {
  return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}

function parseTimeStr(str) {
  const s = (str || '').trim().replace(',', '.');
  if (s.includes(':')) {
    const [hPart, mPart] = s.split(':');
    const h = parseInt(hPart, 10), m = parseInt(mPart, 10);
    if (!isNaN(h) && !isNaN(m)) return h + m / 60;
  }
  return parseFloat(s);
}

function fmtH(h) {
  const hh = h >= 24 ? h - 24 : h;
  const totalMin = Math.round((h % 1) * 60);
  return String(Math.floor(hh)).padStart(2,'0') + ':' + String(totalMin).padStart(2,'0');
}

function addActBehavior(div) {
  div.addEventListener('click', () => {
    div.classList.toggle('selected');
    const selected = div.classList.contains('selected');
    const discoColor = discoActColor(div);

    if (selected) {
      if (discoColor) {
        div.style.background = '';
        div.style.borderLeftColor = '#fff';
      } else {
        setNormalSelectedActStyle(div);
      }
    } else {
      clearNormalSelectedActStyle(div);
      div.style.borderLeftColor = '';
    }

    if (!selected) {
      const isNow = div.classList.contains('act-now');
      const isFS = document.body.classList.contains('is-fullscreen');
      div.style.borderLeftColor = discoColor || ((isNow && !isFS) ? accentColor : '');
      div.style.borderTopColor = (!discoColor && isNow && !isFS) ? accentColor : '';
    }

    const favs = getFavs();
    saveFavs(selected ? [...favs, div.id] : favs.filter(f => f !== div.id));
    updateResetBtn();
  });
}

function escapeHTML(v) {
  return String(v || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

function classifyActName(name) {
  const words = String(name || '').split(' ');
  const longest = Math.max(0, ...words.map(w => w.length));
  if (longest >= 13) return 'name-long-b';
  if (longest === 12) return 'name-xl';
  if (longest === 11) return 'name-long';
  if (longest === 10) return '';
  if (longest === 9)  return 'name-md';
  if (longest === 8)  return 'name-semi';
  if (longest === 7)  return 'name-lg7';
  return 'name-lg6';
}

function createActNameHTML(name) {
  const clean = name === '?' ? '' : String(name || '');
  const safe  = escapeHTML(clean);
  const cls   = classifyActName(clean);
  return `<div class="act-name${cls ? ' ' + cls : ''}" title="${safe}">${safe}</div>`;
}

function renderDay(dayKey) {
  const day = DAYS[dayKey];
  const stageRow = $('stage-row');
  const tl = $('tl');
  const axis = $('axis');
  const favs = getFavs();
  const overrideEntries = Object.entries(overrides);

  document.body.classList.remove(...DAY_KEYS.map(d => 'day-' + d));
  document.body.classList.add('day-' + dayKey);
  setScheduleGrid(stageRow, tl, day.gridCols);

  const stageFrag = buildStageHeaderFragment(day.stages, s => buildStageHeader(s.name, s.sub));
  const axisFrag = buildAxisFragment(day.startHour, day.endHour);
  const timelineFrag = document.createDocumentFragment();

  day.stages.forEach(stage => {
    const col = document.createElement('div');
    col.className = 'stage-col';

    getActsFromOverrides(dayKey, stage.name, overrideEntries).forEach(act => {
      const div = createActElement({
        id: `${dayKey}-${stage.name}-${act.start}`,
        name: act.name,
        start: act.start,
        end: act.end,
        className: 'act' + (act.name === 'RuneScape Rave' ? ' act-runescape' : ''),
        favs,
      });
      positionAct(div, act.start, act.end, day.startHour, day.endHour);
      col.appendChild(div);
    });

    timelineFrag.appendChild(col);
  });

  swapSchedule(stageRow, axis, tl, stageFrag, axisFrag, timelineFrag);
  updateNowLine();
  updateResetBtn();
}

function getDiscoActs(dayKey) {
  const result = { DiscoR: [], DiscoB: [], DiscoG: [] };

  Object.entries(overrides).forEach(([key, ov]) => {
    const [d, stage, startStr] = key.split('|');
    if (d !== dayKey) return;

    const norm = stage.toLowerCase();
    const bucket = norm === 'discor' ? 'DiscoR' : norm === 'discob' ? 'DiscoB' : norm === 'discog' ? 'DiscoG' : null;
    if (!bucket) return;

    const rawStart = parseFloat(startStr);
    if (!Number.isFinite(rawStart)) return;
    const rawEnd = typeof ov.end === 'number' ? ov.end : rawStart + 1;
    result[bucket].push({
      name: ov.name || '',
      start: rawStart < 6 ? rawStart + 24 : rawStart,
      end: rawEnd < 6 ? rawEnd + 24 : rawEnd,
    });
  });

  Object.values(result).forEach(list => list.sort((a, b) => a.start - b.start));
  return result;
}

function renderDisco(dayKey) {
  const acts = getDiscoActs(dayKey);
  const stageRow = $('stage-row');
  const tl = $('tl');
  const axis = $('axis');
  const favs = getFavs();
  const dayStyles = discoStyles[dayKey] || {};

  const stages = Object.entries(DISCO_STAGE_META)
    .map(([key, meta]) => ({ key, ...meta, label: meta.labels[currentLang], style: dayStyles[key] || '' }))
    .filter(stage => acts[stage.key].some(a => a.name !== ''));

  const allActs = stages.flatMap(stage => acts[stage.key]);
  const gridCols = `60px ${'1fr '.repeat(Math.max(stages.length, 1)).trim()}`;
  setScheduleGrid(stageRow, tl, gridCols);

  const stageFrag = buildStageHeaderFragment(stages, stage => buildStageHeader(stage.label, stage.style, stage.color, stage.color));
  if (!allActs.length) {
    clearSchedule(stageRow, axis, tl);
    stageRow.appendChild(stageFrag);
    return;
  }

  const startHour = Math.floor(Math.min(...allActs.map(a => a.start)));
  const endHour = Math.ceil(Math.max(...allActs.map(a => a.end)));
  discoHours = { start: startHour, end: endHour };

  const axisFrag = buildAxisFragment(startHour, endHour);
  const timelineFrag = document.createDocumentFragment();

  stages.forEach(stage => {
    const col = document.createElement('div');
    col.className = 'stage-col';

    acts[stage.key].forEach(act => {
      if (!act.name) return;
      const div = createActElement({
        id: `${dayKey}-${stage.key}-${act.start}`,
        name: act.name,
        start: act.start,
        end: act.end,
        className: `act ${stage.cssClass}`,
        borderLeftColor: stage.color,
        favs,
        favMode: 'disco',
      });
      positionAct(div, act.start, act.end, startHour, endHour);
      col.appendChild(div);
    });

    timelineFrag.appendChild(col);
  });

  swapSchedule(stageRow, axis, tl, stageFrag, axisFrag, timelineFrag);
  updateNowLine();
  updateResetBtn();
}

function updateResetBtn() {
  const wrap = $('reset-wrap');
  if (wrap) wrap.style.display = getFavs().length > 0 ? 'block' : 'none';
}

function getCurrentFestivalDay() {
  return getJuly2026Day(2, FESTIVAL_DAYS, null);
}

function getDiscoDay() {
  return getJuly2026Day(6, DISCO_DAYS, 'vendredi');
}

function getDefaultDay() {
  return getCurrentFestivalDay() || 'jeudi';
}

function setActiveDay(day) {
  document.querySelectorAll('.day-item').forEach(d => {
    const active = d.dataset.day === day;
    d.classList.toggle('active', active);
    if (active) $('current-date').textContent = d.dataset[activeDateKey()] || '';
  });
}

function setUtilityButtonState(btn, isActive) {
  if (!btn) return;
  btn.style.opacity = isActive ? '1' : '0.85';
  btn.style.borderColor = isActive ? 'rgba(255,255,255,0.6)' : '#ffffff30';
  btn.style.background = isActive ? accentBg : '#ffffff12';
}

function getCurrentInfoDay() {
  return getJuly2026Day(6, FESTIVAL_DAYS, null);
}

function isInfoItemActive(item, h) {
  const start = Number(item && item.start);
  const end = Number(item && item.end);

  if (!Number.isFinite(start) || !Number.isFinite(end)) return false;

  return start <= h && h < end;
}

function isSilentDiscoInfoItem(item) {
  const label = String(item && item.label || '')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .toLowerCase();
  return /silent\s*disco/.test(label);
}

function isInfoCurrentlyActive() {
  const now = getNow();
  let h = now.getHours() + now.getMinutes() / 60;
  if (h < 6) h += 24;
  const dayKey = getCurrentInfoDay();
  if (!dayKey) return false;
  const items = infoData[dayKey] || [];
  return items.some(item => !isSilentDiscoInfoItem(item) && isInfoItemActive(item, h));
}

function getCurrentDiscoState() {
  const now = getNow();
  const active = now.getFullYear() === 2026 && now.getMonth() === 6 && now.getHours() >= 0 && now.getHours() < 6;
  if (!active) return { active: false, inPeak: false, dayKey: null };

  const dayKey = DISCO_NIGHT_DAYS[now.getDate()] || null;
  return dayKey ? { active: true, inPeak: true, dayKey } : { active: false, inPeak: false, dayKey: null };
}

function updateDiscoBtn() {
  const btn = $('disco-btn');
  if (!btn) return false;
  const state = getCurrentDiscoState();
  document.body.classList.toggle('disco-peak', discoMode && state.inPeak && state.active);
  setUtilityButtonState(btn, state.active);
  return state.active;
}

function updateCampingBtn() {
  const btn = $('camping-btn');
  if (!btn) return false;
  const hasActive = isInfoCurrentlyActive();
  setUtilityButtonState(btn, hasActive);
  return hasActive;
}

function renderCamping(dayKey) {
  const stageRow = $('stage-row');
  const tl = $('tl');
  const axis = $('axis');
  clearSchedule(stageRow, axis, tl);
  setScheduleGrid(stageRow, tl, '60px 1fr');

  const stageFrag = buildStageHeaderFragment([{ name: 'INFOS', sub: '' }], s => buildStageHeader(s.name, s.sub));
  stageRow.appendChild(stageFrag);

  const col = document.createElement('div');
  col.className = 'stage-col info-col';

  const now = getNow();
  let h = now.getHours() + now.getMinutes() / 60;
  if (h < 6) h += 24;

  const todayKey = getCurrentInfoDay();
  const forceActive = document.body.classList.contains('is-fullscreen');
  (infoData[dayKey] || []).forEach(item => {
    const isActive = forceActive || (todayKey === dayKey && isInfoItemActive(item, h));
    const card = document.createElement('div');
    card.className = 'camping-card' + (isActive ? ' camping-card-active' : '');
    if (isActive) card.style.borderLeftColor = accentColor;
    const timeStr = item.end !== null ? `${fmtH(item.start)} - ${fmtH(item.end)}` : fmtH(item.start);
    card.innerHTML = `<div class="camping-label">${escapeHTML(item.label)}</div><div class="camping-time">${timeStr}</div>`;
    col.appendChild(card);
  });

  tl.appendChild(col);
  updateResetBtn();
}

function normalizeFullscreenActBorders() {
  if (!document.body.classList.contains('is-fullscreen') || discoMode) return;
  document.querySelectorAll('.act').forEach(act => {
    if (discoActColor(act)) return;
    act.style.borderTopColor = '';
    if (act.classList.contains('selected')) {
      setNormalSelectedActStyle(act);
    } else {
      act.style.borderLeftColor = '';
    }
  });
}

function updateNowLine() {
  const tl = $('tl');
  const existing = $('now-line');

  if (discoMode) {
    const renderedDay = document.querySelector('.day-item.active')?.dataset.day;
    if (renderedDay && renderedDay !== getDiscoDay()) {
      if (existing) existing.remove();
      document.querySelectorAll('.act').forEach(act => {
        act.classList.remove('act-now', 'act-past');
      });
      return;
    }
    const now = getNow();
    const nd = now.getDate(), nm = now.getMonth(), ny = now.getFullYear(), nh = now.getHours();
    const inFestival = ny === 2026 && nm === 6 && (((nd === 4 || nd === 5) && nh < 6) || (nd === 6 && nh < 5));
    let h = nh + now.getMinutes() / 60;
    if (h < 6) h += 24;
    if (!inFestival || h < discoHours.start || h >= discoHours.end) {
      if (existing) existing.remove();
      document.querySelectorAll('.act').forEach(act => {
        act.classList.remove('act-now');
        act.classList.remove('act-past');
      });
      return;
    }
    const totalMin = (discoHours.end - discoHours.start) * 60;
    const topPct   = ((h - discoHours.start) * 60) / totalMin * 100;
    const line = existing || document.createElement('div');
    line.id = 'now-line';
    if (!existing) {
      Object.assign(line.style, { position: 'absolute', left: '0', right: '0', height: '4px', background: 'var(--accent)', boxShadow: '0 0 12px var(--accent)', zIndex: '10', pointerEvents: 'none', transform: 'translateY(-50%)' });
      tl.appendChild(line);
    }
    line.style.height = '4px';
    line.style.transform = 'translateY(-50%)';
    line.style.boxShadow = '0 0 12px var(--accent)';
    line.style.top = topPct + '%';
    document.querySelectorAll('.act').forEach(act => {
      const s = parseFloat(act.dataset.start), e = parseFloat(act.dataset.end);
      act.classList.toggle('act-now',  h >= s && h < e);
      act.classList.toggle('act-past', h >= e);
    });
    return;
  }

  const festivalDay = getCurrentFestivalDay();
  const activeDay = document.querySelector('.day-item.active');

  const festivalIdx = festivalDay ? DAY_KEYS.indexOf(festivalDay) : -1;
  const viewedIdx = activeDay ? DAY_KEYS.indexOf(activeDay.dataset.day) : -1;

  if (festivalDay && viewedIdx < festivalIdx) {
    if (existing) existing.remove();
    document.querySelectorAll('.act').forEach(act => {
      act.classList.add('act-past');
      act.classList.remove('act-now');
    });
    return;
  }

  if (!festivalDay || !activeDay || activeDay.dataset.day !== festivalDay) {
    if (existing) existing.remove();
    return;
  }

  const day = DAYS[festivalDay];
  const now = getNow();
  let h = now.getHours() + now.getMinutes() / 60;
  if (h < 2) h += 24;

  if (h < day.startHour || h >= day.endHour) {
    if (existing) existing.remove();
    return;
  }

  const totalMin = (day.endHour - day.startHour) * 60;
  const topPct = ((h - day.startHour) * 60) / totalMin * 100;

  const line = existing || document.createElement('div');
  line.id = 'now-line';
  if (!existing) {
    Object.assign(line.style, {
      position: 'absolute', left: '0', right: '0',
      height: '4px', background: 'var(--accent)',
      boxShadow: '0 0 12px var(--accent)',
      zIndex: '10', pointerEvents: 'none', transform: 'translateY(-50%)'
    });
    tl.appendChild(line);
  }
  line.style.height = '4px';
  line.style.transform = 'translateY(-50%)';
  line.style.boxShadow = '0 0 12px var(--accent)';
  line.style.top = topPct + '%';

  const isFS = document.body.classList.contains('is-fullscreen');
  document.querySelectorAll('.act').forEach(act => {
    const s = parseFloat(act.dataset.start);
    const e = parseFloat(act.dataset.end);
    const isNow = h >= s && h < e;
    act.classList.toggle('act-now', isNow);
    act.classList.toggle('act-past', h >= e);
    if (act.classList.contains('selected') && !discoActColor(act)) {
      setNormalSelectedActStyle(act);
    } else {
      act.style.borderLeftColor = (isNow && !isFS) ? accentColor : '';
      act.style.borderTopColor = (isNow && !isFS) ? accentColor : '';
    }
  });
  normalizeFullscreenActBorders();
}

  normalDayKey = getDefaultDay();

    }));
  });
  if (localStorage.getItem('rs_unlocked')) document.body.classList.add('runescape-unlocked');

  function updateDaysLeft() {
    const el = $('days-left');
    if (!el) return;
    const now = getNow();
    const today = new Date(now); today.setHours(0, 0, 0, 0);
    const diff = Math.ceil((new Date('2026-07-02T00:00:00') - today) / 86400000);
    const festivalOver = today > new Date('2026-07-05T23:59:59');

    el.textContent = lang === 'zh' ? diff + '天' : lang === 'en' ? 'D-' + diff : 'J-' + diff;
  }
  updateDaysLeft();
  updateDiscoBtn();
  updateCampingBtn();

  setInterval(() => { updateNowLine(); updateDiscoBtn(); updateCampingBtn(); }, 60000);

  const setTitle = title => document.querySelector('.label span').textContent = title;
  const selectDefaultDay = () => { normalDayKey = getDefaultDay(); setActiveDay(normalDayKey); };
  const showDefaultDay = () => { selectDefaultDay(); renderDay(normalDayKey); };
  function stopDisco(renderNormal = true) {
    discoMode = false;
    updateDiscoBtn();
    setTitle('Rampage Open Air 2026');
    document.body.classList.remove('disco-mode');
    if (easterActive === 'disco') triggerEaster('disco');
    if (renderNormal) showDefaultDay();
  }

  localStorage.setItem('lastLoadTime', Date.now());
  setTimeout(() => location.reload(), REFRESH_MS);
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) {

    }
  });

  document.querySelectorAll('.day-item').forEach(el => {
    el.addEventListener('click', () => {
      const selectedDay = el.dataset.day;
      if (discoMode) {
        discoDayKey = selectedDay;

        renderDisco(discoDayKey);

  const langBtn = $('lang-btn');

    }

    else if (campingMode) renderCamping(campingDayKey);
  });

  let langPressTimer = null, langDidLong = false, manualLangEaster = null;
  langBtn.addEventListener('contextmenu', e => e.preventDefault());
  langBtn.addEventListener('pointerdown', e => {
    langBtn.setPointerCapture(e.pointerId);

    langPressTimer = setTimeout(() => {
      langDidLong = true;
      manualLangEaster = lang;
      triggerEaster(lang);

  langBtn.addEventListener('pointerup',     () => clearTimeout(langPressTimer));
  langBtn.addEventListener('pointercancel', () => clearTimeout(langPressTimer));

  const colorBtn = $('color-btn');
  const colorMenu = $('color-menu');
  colorBtn.addEventListener('click', e => {
    e.stopPropagation();
    colorMenu.classList.toggle('open');
  });

  const settingsBtn = $('settings-btn');
  const bottomBar = $('bottom-bar');
  settingsBtn.addEventListener('click', e => {

  const discoBtn = $('disco-btn');
  discoBtn.addEventListener('click', e => {
    e.stopPropagation();
    if (campingMode) { campingMode = false; updateCampingBtn(); }

    discoMode = !discoMode;
    if (!discoMode) { stopDisco(true); return; }

    document.body.classList.add('disco-mode');
    if (easterActive !== 'disco') triggerEaster('disco');

    renderDisco(discoDayKey);
    updateDiscoBtn();
  });

  const campingBtn = $('camping-btn');
  campingBtn.addEventListener('click', e => {
    e.stopPropagation();
    if (discoMode) { stopDisco(false); selectDefaultDay(); updateDiscoBtn(); }

    campingMode = !campingMode;
    if (campingMode) {
      updateCampingBtn();
      campingDayKey = normalDayKey;
      setActiveDay(campingDayKey);
      renderCamping(campingDayKey);
      return;
    }

    showDefaultDay();
    updateCampingBtn();
  });

  document.addEventListener('click', () => colorMenu.classList.remove('open'));
  document.querySelectorAll('.color-option').forEach(opt => {
    opt.addEventListener('click', e => {
      e.stopPropagation();
      accentColor = opt.dataset.accent; accentBg = opt.dataset.bg; accentBorder = opt.dataset.border;
      document.querySelector('.bg-full').style.background = `linear-gradient(to bottom, #0d0d0d 0%, transparent 15%, transparent 85%, #0d0d0d 100%), radial-gradient(ellipse at 50% 50%, ${opt.dataset.glow} 0%, #0d0d0d 70%)`;
      applyAccentToElements();
      document.querySelectorAll('.color-option').forEach(o => o.classList.remove('current'));
      opt.classList.add('current');
      colorMenu.classList.remove('open');
      localStorage.setItem('color', JSON.stringify({accent: accentColor, bg: accentBg, border: accentBorder, glow: opt.dataset.glow}));
    });
  });

  function applyScale() {
    const scaler = $('scaler');
    const vw = window.visualViewport ? window.visualViewport.width  : window.innerWidth;
    const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
    const baseW = 1080;
    const baseH = 1920;
    const isAppFullscreen = document.body.classList.contains('is-fullscreen');
    const viewportRatio = vw / vh;
    const designRatio = baseW / baseH;

    let scale;
    let virtualH = baseH;
    let left = 0;
    let top = 0;

    if (isAppFullscreen && viewportRatio < designRatio) {
      scale = vw / baseW;
      virtualH = Math.max(baseH, vh / scale);
      left = 0;
      top = 0;
    } else {
      scale = Math.min(vw / baseW, vh / baseH);
      virtualH = baseH;
      left = (vw - baseW * scale) / 2;
      top = isAppFullscreen ? 0 : (vh - baseH * scale) / 2;
    }

    const desiredPhysicalTop = isAppFullscreen ? 10 : 0;
    const desiredPhysicalBottom = isAppFullscreen ? 30 : 0;
    const topPad = isAppFullscreen
      ? Math.max(10, Math.min(360, desiredPhysicalTop / Math.max(scale, 0.001)))
      : 25;
    const bottomPad = isAppFullscreen
      ? Math.max(30, Math.min(360, desiredPhysicalBottom / Math.max(scale, 0.001)))
      : 100;

    const leftPad = isAppFullscreen ? 90 : 62;
    const rightPad = isAppFullscreen ? 90 : 62;

    const extraHeightRatio = Math.max(0, virtualH / baseH - 1);
    const textBoost = isAppFullscreen
      ? Math.max(1.08, Math.min(1.78, 1.08 + extraHeightRatio * 3.0))
      : 1;

    document.documentElement.style.setProperty('--fs-top-pad', topPad.toFixed(1) + 'px');
    document.documentElement.style.setProperty('--fs-bottom-pad', bottomPad.toFixed(1) + 'px');
    document.documentElement.style.setProperty('--fs-left-pad', leftPad.toFixed(1) + 'px');
    document.documentElement.style.setProperty('--fs-right-pad', rightPad.toFixed(1) + 'px');
    document.documentElement.style.setProperty('--fs-text-boost', textBoost.toFixed(3));

    scaler.style.width = baseW + 'px';
    scaler.style.height = virtualH + 'px';
    scaler.style.transform = `scale(${scale})`;
    scaler.style.left = left + 'px';
    scaler.style.top  = top + 'px';
  }

  function refreshFullscreenState() {
    updateEasterVisualBoost();
    if (campingMode) renderCamping(campingDayKey);
    else updateNowLine();
    normalizeFullscreenActBorders();
  }

  let responsiveLayoutRAF = 0;
  function queueResponsiveLayout() {
    cancelAnimationFrame(responsiveLayoutRAF);
    responsiveLayoutRAF = requestAnimationFrame(applyScale);
  }

  applyScale();
  window.addEventListener('resize', queueResponsiveLayout);
  if (window.visualViewport) window.visualViewport.addEventListener('resize', queueResponsiveLayout);

  const fsBtn = $('fs-btn');
  let appFS = false;

  function enterFS() {
    appFS = true;
    document.body.classList.add('is-fullscreen');
    applyScale();
    refreshFullscreenState();
    applyAccentToElements();
    document.addEventListener('click', exitOnClick);
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
    if (req) req.call(el).catch(() => {});
  }

  function leaveFS() {
    appFS = false;
    document.body.classList.remove('is-fullscreen');
    applyScale();
    refreshFullscreenState();
    applyAccentToElements();
    document.removeEventListener('click', exitOnClick);
    const exit = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen;
    if (exit && (document.fullscreenElement || document.webkitFullscreenElement)) exit.call(document).catch(() => {});
  }

  fsBtn.addEventListener('click', e => {
    e.stopPropagation();
    appFS ? leaveFS() : enterFS();
  });

  function onFSChange() {
    const nativeFS = !!(document.fullscreenElement || document.webkitFullscreenElement);
    if (!nativeFS && appFS) leaveFS();
  }
  document.addEventListener('fullscreenchange', onFSChange);
  document.addEventListener('webkitfullscreenchange', onFSChange);

  const resetBtn = $('reset-btn');
  const resetLabel = $('reset-label');
  let resetStep = 0, resetTimer = null;
  const resetDeactivate = () => {
    resetStep = 0;
    resetBtn.style.borderColor = '#ffffff20';
    resetBtn.style.background = '#ffffff12';
    resetLabel.style.display = 'none';
  };
  updateResetBtn();
  resetBtn.addEventListener('click', e => {
    e.stopPropagation();
    clearTimeout(resetTimer);
    if (resetStep === 0) {
      resetStep = 1;
      resetBtn.style.borderColor = '#ff4444';
      resetBtn.style.background = '#ff000022';
      resetLabel.textContent = 'RESET?';
      resetLabel.style.display = 'block';
      resetTimer = setTimeout(resetDeactivate, 5000);
    } else if (resetStep === 1) {
      resetStep = 2;
      resetLabel.textContent = 'SURE?';
      resetTimer = setTimeout(resetDeactivate, 5000);
    } else {
      resetDeactivate();
      localStorage.removeItem('favs');
      localStorage.removeItem('rs_unlocked');
      document.body.classList.remove('runescape-unlocked');
      document.querySelectorAll('.act.selected').forEach(el => {
        el.classList.remove('selected');
        clearNormalSelectedActStyle(el);
        el.style.borderLeftColor = '';
      });
      updateResetBtn();
    }
  });

  let easterActive = null;
  let preEasterState = null;
  const boostedEasterEvents = new Set(['shrek', 'alien', 'runescape', 'fr', 'en', 'zh']);

  function updateEasterVisualBoost() {
    document.body.classList.toggle(
      'easter-visual-boost',
      document.body.classList.contains('is-fullscreen') && boostedEasterEvents.has(easterActive)
    );
  }

  function applyAccentToElements() {
    setThemeVars();
    if (colorBtn) colorBtn.style.background = accentColor;
    paintThemedButtons();
    document.querySelectorAll('.label').forEach(el => el.style.color = accentColor);
    const dlElA = $('days-left'); if (dlElA) dlElA.style.color = accentColor;
    document.querySelectorAll('.sh-name').forEach(el => el.style.color = accentColor);
    document.querySelectorAll('.stage-header').forEach(el => el.style.borderTopColor = accentColor);
    document.querySelectorAll('.act.selected').forEach(el => { if (!discoActColor(el)) setNormalSelectedActStyle(el); });
    const isFS = document.body.classList.contains('is-fullscreen');
    document.querySelectorAll('.act.act-now').forEach(el => {
      if (el.classList.contains('act-disco-r') || el.classList.contains('act-disco-b') || el.classList.contains('act-disco-g')) return;
      if (el.classList.contains('selected')) { setNormalSelectedActStyle(el); return; }
      el.style.borderLeftColor = isFS ? '' : accentColor;
      el.style.borderTopColor = isFS ? '' : accentColor;
    });
    const nl = $('now-line');
    if (nl) { nl.style.background = accentColor; nl.style.boxShadow = `0 0 12px ${accentColor}`; }
    document.querySelectorAll('.camping-card-active').forEach(el => el.style.borderLeftColor = accentColor);
  }

  function setEaster(mode) {
    const wasActive = easterActive;
    easterActive = easterActive === mode ? null : mode;
    Object.entries(EASTER_EVENTS).forEach(([k, cfg]) => {
      $(k + '-img').style.opacity = easterActive === k ? cfg.opacity : '0';
    });
    document.body.classList.toggle('easter-active', easterActive !== null);
    document.body.classList.toggle('runescape-active', easterActive === 'runescape');
    updateEasterVisualBoost();
    if (easterActive === 'runescape') document.body.classList.add('runescape-unlocked');
    if (easterActive) {
      const cfg = EASTER_EVENTS[easterActive];
      preEasterState = { accent: accentColor, bg: accentBg, border: accentBorder, bgFull: document.querySelector('.bg-full').style.background };
      accentColor = cfg.accent; accentBg = cfg.bg; accentBorder = cfg.border;
      document.querySelector('.bg-full').style.background = cfg.blackBg ? '#0d0d0d' : `linear-gradient(to bottom, #0d0d0d 0%, transparent 15%, transparent 85%, #0d0d0d 100%), radial-gradient(ellipse at 50% 50%, ${cfg.glow} 0%, #0d0d0d 70%)`;
      applyAccentToElements();
    } else if (wasActive && preEasterState) {
      accentColor = preEasterState.accent; accentBg = preEasterState.bg; accentBorder = preEasterState.border;
      document.querySelector('.bg-full').style.background = preEasterState.bgFull;
      applyAccentToElements();
      preEasterState = null;
    }
  }

  const manuallyTriggered = new Set();
  function triggerEaster(key) {
    const wasActive = easterActive === key;
    if (wasActive) manuallyTriggered.delete(key);
    else manuallyTriggered.add(key);
    setEaster(key);
    const cfg = EASTER_EVENTS[key];
    if (cfg.comic) { $('scaler').classList.toggle('comic-sans', !wasActive); }
  }

  let shrekClicks = 0, shrekTimer;
  let comicClicks = 0, comicTimer;
  let runeClicks = 0, runeTimer;
  const easterLabel = document.querySelector('.label');
  const easterDate = $('current-date');

  document.addEventListener('pointerdown', (e) => {
    if (e.target.closest('.label')) {
      if (shrekClicks === 0) shrekTimer = setTimeout(() => shrekClicks = 0, 5000);
      shrekClicks++;
      easterLabel.style.color = '#fff';
      setTimeout(() => easterLabel.style.color = accentColor, 200);
      if (shrekClicks >= 5) { shrekClicks = 0; clearTimeout(shrekTimer); triggerEaster('shrek'); }
    }
    if (e.target.closest('#current-date')) {
      if (comicClicks === 0) comicTimer = setTimeout(() => comicClicks = 0, 5000);
      comicClicks++;
      easterDate.style.color = '#fff';
      setTimeout(() => easterDate.style.color = '', 200);
      if (comicClicks >= 5) { comicClicks = 0; clearTimeout(comicTimer); triggerEaster('alien'); }
    }
  });

  document.addEventListener('click', e => {
    const act = e.target.closest('.act');
    if (!act || act.querySelector('.act-name')?.textContent.trim() !== 'RuneScape Rave') return;
    if (runeClicks === 0) runeTimer = setTimeout(() => runeClicks = 0, 5000);
    runeClicks++;
    if (runeClicks >= 6) {
      runeClicks = 0; clearTimeout(runeTimer);
      localStorage.setItem('rs_unlocked', '1');
      document.body.classList.add('runescape-unlocked');
      triggerEaster('runescape');
    }
  });

  (() => {
    const now = getNow();
    const h = now.getHours(), m = now.getMinutes();
    const nowMins = h * 60 + m;
    const todayStr = ymd(now);
    let exactKey = null, windowKey = null;
    Object.entries(EASTER_EVENTS).forEach(([key, cfg]) => {
      if (cfg.activeDates && !cfg.activeDates.includes(todayStr)) return;
      const inWindow = cfg.triggers.some(t => nowMins >= t.h * 60 + t.m && nowMins < t.endH * 60 + (t.endM ?? 0));
      if (!inWindow) return;
      const isExact = cfg.triggers.some(t => t.h === h && t.m === m);
      if (isExact) exactKey = key;
      else windowKey = key;
    });
    const toActivate = exactKey ?? windowKey;
    if (toActivate) {
      setEaster(toActivate);
      if (EASTER_EVENTS[toActivate].comic) { $('scaler').classList.add('comic-sans'); }
    }
  })();

  setInterval(() => {
    const now = getNow();
    const h = now.getHours(), m = now.getMinutes();
    const nowMins = h * 60 + m;
    const todayStr = ymd(now);
    Object.entries(EASTER_EVENTS).forEach(([key, cfg]) => {
      if (manuallyTriggered.has(key)) return;
      if (cfg.activeDates && !cfg.activeDates.includes(todayStr)) return;
      const isTrigger = cfg.triggers.some(t => t.h === h && t.m === m);
      const isEnd     = cfg.triggers.some(t => h === t.endH && m === (t.endM ?? 0));
      const inWindow  = cfg.triggers.some(t => nowMins >= t.h * 60 + t.m && nowMins < t.endH * 60 + (t.endM ?? 0));
      if (!inWindow && !isEnd) {
        sessionStorage.removeItem(`rs_${key}`);
        sessionStorage.removeItem(`re_${key}`);
        return;
      }
      if (isTrigger && !sessionStorage.getItem(`rs_${key}`)) {
        sessionStorage.setItem(`rs_${key}`, '1');
        location.reload();
      } else if (isEnd && !sessionStorage.getItem(`re_${key}`)) {
        sessionStorage.setItem(`re_${key}`, '1');
        location.reload();
      }
    });
  }, 1000);

  function exitOnClick(e) {
    if (!e.target.closest('.act') && !e.target.closest('.day-item')) {
      leaveFS();
    }
  }

});
</script>
</body>
</html>

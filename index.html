<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    background: #0d0d0d;
    width: 100%; height: 100%;
    overflow: hidden;
  }

  :root { --accent: #eb0028; --accent-bg: #4b000e; --accent-border: #eb0028; }

  body {
    background: transparent; color: #fff;
    font-family: 'Inter', sans-serif;
    width: 100vw; height: 100dvh;
    overflow: hidden; position: relative;
    opacity: 0; transition: opacity 0.2s;
  }

  .bg-full {
    position: fixed;
    inset: 0;
    background:
      linear-gradient(to bottom,
        #0d0d0d 0%,
        transparent 15%,
        transparent 85%,
        #0d0d0d 100%
      ),
      radial-gradient(ellipse at 50% 50%, rgba(235, 0, 40, 0.4) 0%, #0d0d0d 70%);
    z-index: 0;
  }

  #scaler {
    position: absolute;
    width: 1080px;
    height: 1920px;
    transform-origin: top left;
    z-index: 1;
  }

  .content {
    position: relative; z-index: 1;
    padding: 32px 55px 70px;
    height: 100%; display: flex; flex-direction: column;
  }

  .top-bar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }

  .color-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--accent); border: 2px solid #ffffff15;
    cursor: pointer; flex-shrink: 0; margin-top: -6px; opacity: 0.6;
  }
  .color-menu {
    position: absolute; right: 0; top: 52px;
    background: #1a1a1a; border: 1px solid #333;
    border-radius: 8px; padding: 10px;
    display: none; flex-direction: column; gap: 8px; z-index: 100;
  }
  .color-menu.open { display: flex; }
  .color-option { width: 44px; height: 44px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
  .color-option:hover, .color-option.current { border-color: #fff; }

  .label { font-size: 22px; letter-spacing: 5px; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 28px; }
  #days-left { font-family: 'Bebas Neue', sans-serif; font-size: 34px; letter-spacing: 3px; color: var(--accent); opacity: 0.85; flex-shrink: 0; }
  .is-fullscreen #days-left { display: none; }
  .is-fullscreen .day-item:not(.active) { display: none; }
  .day-row { display: flex; align-items: flex-end; gap: 20px; }
  .day-item {
    font-family: 'Bebas Neue', sans-serif; line-height: 1;
    cursor: pointer; white-space: nowrap; user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: color 0.2s, font-size 0.2s;
    color: #ffffff22; font-size: 40px; padding-bottom: 6px;
  }
  .day-item.active { color: #fff; font-size: 90px; padding-bottom: 0; }
  .day-date { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: #ffffff44; letter-spacing: 6px; margin-top: 8px; margin-bottom: 12px; }

  .stage-row { display: grid; gap: 0 6px; margin-bottom: 6px; }
  .stage-header { border-top: 2px solid var(--accent); padding-top: 6px; }
  .sh-name { font-size: 21px; font-weight: 700; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }
  .sh-sub { font-size: 13px; color: #ffffff66; margin-top: 2px; }

  .timeline { flex: 1; display: grid; gap: 0 6px; position: relative; min-height: 0; }

  .time-axis { position: relative; }
  .tick-label {
    position: absolute; right: 8px;
    font-size: 18px; font-weight: 600;
    color: #ffffffaa; letter-spacing: 1px;
    font-variant-numeric: tabular-nums;
    transform: translateY(-50%);
  }

  .stage-col { position: relative; }

  .act {
    position: absolute; left: 0; right: 0;
    border-radius: 3px; padding: 10px 13px;
    background: #1c1c1c; border-left: 3px solid #444; border-top: 1px solid #2a2a2a;
    overflow: hidden; cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent; user-select: none;
    box-sizing: border-box;
  }
  .act.selected { background: var(--accent-bg); border-left: 3px solid var(--accent-border); }
  .act.selected::before { content: ''; position: absolute; inset: 0; background: var(--accent); opacity: 0.15; border-radius: inherit; pointer-events: none; }
  .act.act-now { background: #2a2a2a; border-left: 4px solid var(--accent); border-top-color: var(--accent); }
  .act.act-past { opacity: 0.65; }
  .easter-active .act { opacity: 0.75; }
  .easter-active .act.act-past { opacity: 0.455; }
  .is-fullscreen .act-past { opacity: 1; }
  .is-fullscreen .act-now { background: #1c1c1c; border-left: 3px solid #444; border-top-color: #2a2a2a; }
  .is-fullscreen .act.selected { background: var(--accent-bg); border-left: 3px solid var(--accent-border); }
  .is-fullscreen #now-line { display: none; }
  .act-name { font-size: 25px; font-weight: 700; color: #fff; line-height: 1.3; }
  .act-time { font-size: 17px; color: #ffffff88; margin-top: 4px; }

  .act-runescape.selected::before { background: #ffffff; opacity: 0.1; }
  .runescape-active .act-runescape.selected::before,
  .runescape-unlocked .act-runescape.selected::before { background: var(--accent); opacity: 0.15; }

  .comic-sans, .comic-sans * { font-family: 'Comic Neue', 'Comic Sans MS', 'Comic Sans', cursive !important; }

  img[id$="-img"] { opacity: 0; transition: opacity 0.6s; }
</style>
</head>

function getNow() {
  const p = new URLSearchParams(location.search).get('t');
  if (!p) return new Date();
  const normalized = p.split(':').length === 2 ? p + ':00' : p;
  const d = new Date(normalized);
  return isNaN(d) ? new Date() : d;
}

function fmtH(h) {
  const hh = h >= 24 ? h - 24 : h;
  const mm = (h % 1 === 0.5) ? '30' : '00';
  return String(Math.floor(hh)).padStart(2,'0') + ':' + mm;
}

function addLongPress(div, nameSelector) {
  let timer = null, didLong = false;
  const start = () => {
    didLong = false;
    timer = setTimeout(() => {
      didLong = true;
      const ne = div.querySelector(nameSelector);
      const cur = ne.textContent;
      const inp = document.createElement('input');
      inp.value = cur;
      inp.style.cssText = 'font-size:16px;font-weight:700;color:#fff;background:transparent;border:none;border-bottom:2px solid var(--accent);outline:none;width:100%;font-family:Inter,sans-serif;';
      ne.replaceWith(inp);
      inp.focus(); inp.select();
      const fin = () => {
        const nd = document.createElement('div');
        nd.className = ne.className;
        nd.textContent = inp.value.trim() || cur;
        inp.replaceWith(nd);
      };
      inp.addEventListener('blur', fin);
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') inp.blur(); });
    }, 1000);
  };
  const cancel = () => clearTimeout(timer);
  div.addEventListener('mousedown', start);
  div.addEventListener('touchstart', start, { passive: true });
  div.addEventListener('mouseup', cancel);
  div.addEventListener('touchend', cancel);
  div.addEventListener('mouseleave', cancel);
  div.addEventListener('click', () => {
    if (!didLong) {
      div.classList.toggle('selected');
      const sel = div.classList.contains('selected');
      const isRuneRave = div.querySelector('.act-name')?.textContent.trim() === 'RuneScape Rave'
                      && !document.body.classList.contains('runescape-active') && !document.body.classList.contains('runescape-unlocked');
      div.style.background = sel ? (isRuneRave ? '#555' : accentBg) : '';
      if (sel) {
        div.style.borderLeftColor = isRuneRave ? '#fff' : accentBorder;
      } else {
        const isNow = div.classList.contains('act-now');
        const isFS = !!document.fullscreenElement;
        div.style.borderLeftColor = (isNow && !isFS) ? accentColor : '';
        div.style.borderTopColor = isNow ? accentColor : '';
      }
      try {
        const stored = JSON.parse(localStorage.getItem('favs'));
        let favs = Array.isArray(stored) ? stored : [];
        if (sel) favs.push(div.id);
        else favs = favs.filter(f => f !== div.id);
        localStorage.setItem('favs', JSON.stringify(favs));
      } catch(e) {}
      updateResetBtn();
    }
  });
}

function renderDay(dayKey) {
  const day = DAYS[dayKey];
  const stageRow = document.getElementById('stage-row');
  const tl = document.getElementById('tl');
  const axis = document.getElementById('axis');

  stageRow.innerHTML = '';
  tl.querySelectorAll('.stage-col').forEach(e => e.remove());
  axis.innerHTML = '';

  stageRow.style.gridTemplateColumns = day.gridCols;
  tl.style.gridTemplateColumns = day.gridCols;

  stageRow.appendChild(document.createElement('div'));
  day.stages.forEach(s => {
    const d = document.createElement('div');
    d.className = 'stage-header';
    d.style.borderTopColor = accentColor;
    d.innerHTML = `<div class="sh-name">${s.name}</div>${s.sub ? `<div class="sh-sub">${s.sub}</div>` : ''}`;
    d.querySelector('.sh-name').style.color = accentColor;
    stageRow.appendChild(d);
  });

  requestAnimationFrame(() => {
    const totalH = tl.clientHeight;
    const totalMin = (day.endHour - day.startHour) * 60;
    const pxPerMin = totalH / totalMin;
    const GAP = 2;

    for (let h = day.startHour; h <= day.endHour; h++) {
      const minOffset = (h - day.startHour) * 60;
      const topPx = minOffset * pxPerMin;
      const span = document.createElement('span');
      span.className = 'tick-label';
      span.textContent = fmtH(h);
      span.style.top = topPx + 'px';
      axis.appendChild(span);
    }

    let favs = [];
    try { const s = JSON.parse(localStorage.getItem('favs')); if (Array.isArray(s)) favs = s; } catch(e) {}

    day.stages.forEach(s => {
      const col = document.createElement('div');
      col.className = 'stage-col';

      s.acts.forEach(a => {
        const topMin = (a.start - day.startHour) * 60;
        const durMin = (a.end - a.start) * 60;
        const topPx = topMin * pxPerMin;
        const heightPx = durMin * pxPerMin - GAP;

        const div = document.createElement('div');
        div.id = `${dayKey}-${s.name}-${a.name}`;
        div.className = 'act' + (a.name === 'RuneScape Rave' ? ' act-runescape' : '');
        if (favs.includes(div.id)) {
          div.classList.add('selected');
          const isRR = a.name === 'RuneScape Rave' && !document.body.classList.contains('runescape-active') && !document.body.classList.contains('runescape-unlocked');
          div.style.background = isRR ? '#555' : accentBg;
          div.style.borderLeftColor = isRR ? '#fff' : accentBorder;
        }
        div.dataset.start = a.start;
        div.dataset.end = a.end;
        div.style.top = topPx + 'px';
        div.style.height = heightPx + 'px';
        div.innerHTML = `<div class="act-name">${a.name}</div><div class="act-time">${fmtH(a.start)} – ${fmtH(a.end)}</div>`;
        addLongPress(div, '.act-name');
        col.appendChild(div);
      });

      tl.appendChild(col);
    });

    updateNowLine();
    fitActNames();
    updateResetBtn();
  });
}

function updateResetBtn() {
  const btn = document.getElementById('reset-btn');
  if (!btn) return;
  try {
    const favs = JSON.parse(localStorage.getItem('favs'));
    btn.style.display = Array.isArray(favs) && favs.length > 0 ? 'flex' : 'none';
  } catch(e) { btn.style.display = 'none'; }
}

function fitActNames() {
  document.querySelectorAll('.act-name').forEach(el => {
    el.style.fontSize = '';
    const maxW = el.parentElement.clientWidth - 26;
    if (el.scrollWidth > maxW) {
      const ratio = maxW / el.scrollWidth;
      el.style.fontSize = Math.max(14, Math.floor(25 * ratio)) + 'px';
    }
  });
}

function getCurrentFestivalDay() {
  const now = getNow();
  const d = new Date(now);
  if (now.getHours() < 2) d.setDate(d.getDate() - 1);
  if (d.getFullYear() !== 2026 || d.getMonth() !== 6) return null;
  return { 2: 'jeudi', 3: 'vendredi', 4: 'samedi', 5: 'dimanche' }[d.getDate()] || null;
}

function updateNowLine() {
  const tl = document.getElementById('tl');
  const existing = document.getElementById('now-line');
  const festivalDay = getCurrentFestivalDay();
  const activeDay = document.querySelector('.day-item.active');

  const dayOrder = ['jeudi', 'vendredi', 'samedi', 'dimanche'];
  const festivalIdx = festivalDay ? dayOrder.indexOf(festivalDay) : -1;
  const viewedIdx = activeDay ? dayOrder.indexOf(activeDay.dataset.day) : -1;

  if (festivalDay && viewedIdx < festivalIdx) {
    if (existing) existing.remove();
    document.querySelectorAll('.act').forEach(act => {
      act.classList.add('act-past');
      act.classList.remove('act-now');
    });
    return;
  }

  if (!festivalDay || !activeDay || activeDay.dataset.day !== festivalDay) {
    if (existing) existing.remove();
    return;
  }

  const day = DAYS[festivalDay];
  const now = getNow();
  let h = now.getHours() + now.getMinutes() / 60;
  if (h < 2) h += 24;

  if (h < day.startHour || h >= day.endHour) {
    if (existing) existing.remove();
    return;
  }

  const totalH = tl.clientHeight;
  const totalMin = (day.endHour - day.startHour) * 60;
  const topPx = ((h - day.startHour) * 60) / totalMin * totalH;

  const line = existing || document.createElement('div');
  line.id = 'now-line';
  if (!existing) {
    Object.assign(line.style, {
      position: 'absolute', left: '0', right: '0',
      height: '2px', background: 'var(--accent)',
      boxShadow: '0 0 8px var(--accent)',
      zIndex: '10', pointerEvents: 'none'
    });
    tl.appendChild(line);
  }
  line.style.top = topPx + 'px';

  const isFS = !!document.fullscreenElement;
  document.querySelectorAll('.act').forEach(act => {
    const s = parseFloat(act.dataset.start);
    const e = parseFloat(act.dataset.end);
    const isNow = h >= s && h < e;
    act.classList.toggle('act-now', isNow);
    act.classList.toggle('act-past', h >= e);
    act.style.borderLeftColor = (isNow && !isFS) ? accentColor : '';
    act.style.borderTopColor = (isNow && !isFS) ? accentColor : '';
  });
}

      el.textContent = el.dataset[lang];
    });

    if (active) {
      const dateKey = 'date' + lang.charAt(0).toUpperCase() + lang.slice(1);
      document.getElementById('current-date').textContent = active.dataset[dateKey];
    }
    updateDaysLeft();
  });

  let langPressTimer = null, langDidLong = false, manualLangEaster = null;
  langBtn.addEventListener('contextmenu', e => e.preventDefault());
  langBtn.addEventListener('pointerdown', e => {
    langBtn.setPointerCapture(e.pointerId);
    langDidLong = false;
    langPressTimer = setTimeout(() => {
      langDidLong = true;
      manualLangEaster = lang;
      triggerEaster(lang);
    }, 5000);
  });
  langBtn.addEventListener('pointerup',     () => clearTimeout(langPressTimer));
  langBtn.addEventListener('pointercancel', () => clearTimeout(langPressTimer));

  const colorBtn = document.getElementById('color-btn');
  const colorMenu = document.getElementById('color-menu');
  colorBtn.addEventListener('click', e => { e.stopPropagation(); colorMenu.classList.toggle('open'); });
  document.addEventListener('click', () => colorMenu.classList.remove('open'));
  document.querySelectorAll('.color-option').forEach(opt => {
    opt.addEventListener('click', e => {
      e.stopPropagation();
      accentColor = opt.dataset.accent; accentBg = opt.dataset.bg; accentBorder = opt.dataset.border;
      document.documentElement.style.setProperty('--accent', accentColor);
      document.documentElement.style.setProperty('--accent-bg', accentBg);
      document.documentElement.style.setProperty('--accent-border', accentBorder);
      document.querySelector('.bg-full').style.background = `linear-gradient(to bottom, #0d0d0d 0%, transparent 15%, transparent 85%, #0d0d0d 100%), radial-gradient(ellipse at 50% 50%, ${opt.dataset.glow} 0%, #0d0d0d 70%)`;
      colorBtn.style.background = accentColor;
      document.querySelectorAll('.label').forEach(el => el.style.color = accentColor);
      const dlEl = document.getElementById('days-left'); if (dlEl) dlEl.style.color = accentColor;
      document.querySelectorAll('.sh-name').forEach(el => el.style.color = accentColor);
      document.querySelectorAll('.stage-header').forEach(el => el.style.borderTopColor = accentColor);
      document.querySelectorAll('.act.act-now').forEach(el => { el.style.borderLeftColor = accentColor; el.style.borderTopColor = accentColor; });
      document.querySelectorAll('.act.selected').forEach(el => { const rr = el.querySelector('.act-name')?.textContent.trim() === 'RuneScape Rave' && !document.body.classList.contains('runescape-active') && !document.body.classList.contains('runescape-unlocked'); el.style.background = rr ? '#555' : accentBg; el.style.borderLeftColor = rr ? '#fff' : accentBorder; });
      const nl = document.getElementById('now-line');

  function applyScale() {
    const scaler = document.getElementById('scaler');
    const vw = window.visualViewport ? window.visualViewport.width  : window.innerWidth;
    const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
    const scale = Math.min(vw / 1080, vh / 1920);
    scaler.style.transform = `scale(${scale})`;
    scaler.style.left = ((vw - 1080 * scale) / 2) + 'px';
    scaler.style.top  = ((vh - 1920 * scale) / 2) + 'px';
  }
  applyScale();
  window.addEventListener('resize', applyScale);
  if (window.visualViewport) window.visualViewport.addEventListener('resize', applyScale);

  const fsBtn = document.getElementById('fs-btn');
  const rightPanel = document.getElementById('right-panel');

  let appFS = false;

  function enterFS() {
    appFS = true;
    document.body.classList.add('is-fullscreen');
    rightPanel.style.visibility = 'hidden';
    applyScale();
    updateNowLine();
    document.addEventListener('click', exitOnClick);
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
    if (req) req.call(el).catch(() => {});
  }

  function leaveFS() {
    appFS = false;
    document.body.classList.remove('is-fullscreen');
    rightPanel.style.visibility = 'visible';
    applyScale();
    updateNowLine();
    document.removeEventListener('click', exitOnClick);
    const exit = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen;
    if (exit && (document.fullscreenElement || document.webkitFullscreenElement)) exit.call(document).catch(() => {});
  }

  fsBtn.addEventListener('click', e => {
    e.stopPropagation();
    appFS ? leaveFS() : enterFS();

  function onFSChange() {
    const nativeFS = !!(document.fullscreenElement || document.webkitFullscreenElement);
    if (!nativeFS && appFS) leaveFS();

  document.addEventListener('fullscreenchange', onFSChange);

  const resetBtn = document.getElementById('reset-btn');

    document.documentElement.style.setProperty('--accent-border', accentBorder);

  }

  function setEaster(mode) {
    const wasActive = easterActive;
    easterActive = easterActive === mode ? null : mode;
    Object.entries(EASTER_EVENTS).forEach(([k, cfg]) => {
      document.getElementById(k + '-img').style.opacity = easterActive === k ? cfg.opacity : '0';
    });
    document.body.classList.toggle('easter-active', easterActive !== null);
    document.body.classList.toggle('runescape-active', easterActive === 'runescape');
    if (easterActive === 'runescape') document.body.classList.add('runescape-unlocked');
    if (easterActive) {
      const cfg = EASTER_EVENTS[easterActive];
      preEasterState = { accent: accentColor, bg: accentBg, border: accentBorder, bgFull: document.querySelector('.bg-full').style.background };
      accentColor = cfg.accent; accentBg = cfg.bg; accentBorder = cfg.border;
      document.querySelector('.bg-full').style.background = cfg.blackBg ? '#0d0d0d' : `linear-gradient(to bottom, #0d0d0d 0%, transparent 15%, transparent 85%, #0d0d0d 100%), radial-gradient(ellipse at 50% 50%, ${cfg.glow} 0%, #0d0d0d 70%)`;
      applyAccentToElements();
    } else if (wasActive && preEasterState) {
      accentColor = preEasterState.accent; accentBg = preEasterState.bg; accentBorder = preEasterState.border;
      document.querySelector('.bg-full').style.background = preEasterState.bgFull;
      applyAccentToElements();
      preEasterState = null;
    }
  }

  const manuallyTriggered = new Set();
  function triggerEaster(key) {
    const wasActive = easterActive === key;
    if (wasActive) manuallyTriggered.delete(key);
    else manuallyTriggered.add(key);
    setEaster(key);
    const cfg = EASTER_EVENTS[key];
    if (cfg.comic) document.getElementById('scaler').classList.toggle('comic-sans', !wasActive);
  }

  let shrekClicks = 0, shrekTimer;
  let comicClicks = 0, comicTimer;
  let runeClicks = 0, runeTimer;
  const easterLabel = document.querySelector('.label');
  const easterDate = document.getElementById('current-date');

  document.addEventListener('pointerdown', (e) => {
    if (e.target.closest('.label')) {
      if (shrekClicks === 0) shrekTimer = setTimeout(() => shrekClicks = 0, 5000);
      shrekClicks++;
      easterLabel.style.color = '#fff';
      setTimeout(() => easterLabel.style.color = accentColor, 200);
      if (shrekClicks >= 5) { shrekClicks = 0; clearTimeout(shrekTimer); triggerEaster('shrek'); }
    }
    if (e.target.closest('#current-date')) {
      if (comicClicks === 0) comicTimer = setTimeout(() => comicClicks = 0, 5000);
      comicClicks++;
      easterDate.style.color = '#fff';
      setTimeout(() => easterDate.style.color = '', 200);
      if (comicClicks >= 5) { comicClicks = 0; clearTimeout(comicTimer); triggerEaster('alien'); }
    }
  });

  document.addEventListener('click', e => {
    const act = e.target.closest('.act');
    if (!act || act.querySelector('.act-name')?.textContent.trim() !== 'RuneScape Rave') return;
    if (runeClicks === 0) runeTimer = setTimeout(() => runeClicks = 0, 5000);
    runeClicks++;
    if (runeClicks >= 6) {
      runeClicks = 0; clearTimeout(runeTimer);
      localStorage.setItem('rs_unlocked', '1');
      document.body.classList.add('runescape-unlocked');
      triggerEaster('runescape');
    }
  });

  (() => {
    const now = getNow();
    const h = now.getHours(), m = now.getMinutes();
    const nowMins = h * 60 + m;
    const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    let exactKey = null, windowKey = null;
    Object.entries(EASTER_EVENTS).forEach(([key, cfg]) => {
      if (cfg.activeDates && !cfg.activeDates.includes(todayStr)) return;
      const inWindow = cfg.triggers.some(t => nowMins >= t.h * 60 + t.m && nowMins < t.endH * 60 + (t.endM ?? 0));
      if (!inWindow) return;
      const isExact = cfg.triggers.some(t => t.h === h && t.m === m);
      if (isExact) exactKey = key;
      else windowKey = key;
    });
    const toActivate = exactKey ?? windowKey;
    if (toActivate) {
      setEaster(toActivate);
      if (EASTER_EVENTS[toActivate].comic) document.getElementById('scaler').classList.add('comic-sans');
    }
  })();

  setInterval(() => {
    const now = getNow();
    const h = now.getHours(), m = now.getMinutes();
    const nowMins = h * 60 + m;
    const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    Object.entries(EASTER_EVENTS).forEach(([key, cfg]) => {
      if (manuallyTriggered.has(key)) return;
      if (cfg.activeDates && !cfg.activeDates.includes(todayStr)) return;
      const isTrigger = cfg.triggers.some(t => t.h === h && t.m === m);
      const isEnd     = cfg.triggers.some(t => h === t.endH && m === (t.endM ?? 0));
      const inWindow  = cfg.triggers.some(t => nowMins >= t.h * 60 + t.m && nowMins < t.endH * 60 + (t.endM ?? 0));
      if (!inWindow && !isEnd) {
        sessionStorage.removeItem(`rs_${key}`);
        sessionStorage.removeItem(`re_${key}`);
        return;
      }
      if (isTrigger && !sessionStorage.getItem(`rs_${key}`)) {
        sessionStorage.setItem(`rs_${key}`, '1');
        location.reload();
      } else if (isEnd && !sessionStorage.getItem(`re_${key}`)) {
        sessionStorage.setItem(`re_${key}`, '1');
        location.reload();
      }
    });
  }, 1000);

  function exitOnClick(e) {
    if (!e.target.closest('.act') && !e.target.closest('.day-item')) {
      leaveFS();
    }
  }

});
</script>
</body>
</html>
